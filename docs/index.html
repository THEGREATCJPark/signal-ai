<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="AI 커뮤니티의 시그널을 추적합니다."/>
<title>SIGNAL — AI 데일리 브리핑</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --paper: #faf8f3;
    --paper-alt: #f3f0e7;
    --ink: #141414;
    --ink-2: #2b2b2b;
    --ink-3: #5a5a5a;
    --ink-4: #8a8a8a;
    --rule: #1a1a1a;
    --rule-soft: #d9d5c7;
    --accent: #b91c1c;
    --accent-soft: #fef2f2;
    --serif: 'Noto Serif KR', 'Times New Roman', serif;
    --sans: 'Noto Sans KR', -apple-system, 'Segoe UI', sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
  }
  .container { max-width: 1120px; margin: 0 auto; padding: 0 24px; }
  @media (max-width: 600px) { .container { padding: 0 18px; } }

  /* Top bar */
  .topbar {
    border-bottom: 1px solid var(--rule-soft);
    background: var(--paper);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--ink-3);
  }
  .topbar-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 24px;
    max-width: 1120px;
    margin: 0 auto;
    text-transform: uppercase;
  }
  .topbar .pulse {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); margin-right: 6px; vertical-align: middle;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Masthead */
  .masthead {
    text-align: center;
    padding: 48px 24px 28px;
    border-bottom: 3px double var(--rule);
  }
  .masthead h1 {
    font-family: var(--serif);
    font-weight: 900;
    font-size: clamp(3.2rem, 10vw, 6rem);
    letter-spacing: -0.04em;
    line-height: 0.9;
    color: var(--ink);
  }
  .masthead .tagline {
    font-family: var(--serif);
    font-style: italic;
    font-size: 1.05rem;
    color: var(--ink-3);
    margin-top: 14px;
    font-weight: 400;
  }
  .masthead .meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-4);
    margin-top: 18px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .masthead .meta .dot { margin: 0 10px; opacity: 0.5; }

  /* Section heading */
  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 56px 0 24px;
  }
  .section-label::before, .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--rule-soft);
  }

  /* Hero article */
  .hero {
    padding: 28px 0 48px;
    border-bottom: 1px solid var(--rule-soft);
    cursor: pointer;
    transition: opacity .2s;
  }
  .hero:hover { opacity: 0.85; }
  .hero .kicker {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .hero h2 {
    font-family: var(--serif);
    font-size: clamp(1.8rem, 4.5vw, 3rem);
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 20px;
  }
  .hero .lede {
    font-family: var(--serif);
    font-size: 1.15rem;
    line-height: 1.7;
    color: var(--ink-2);
    max-width: 780px;
  }
  .hero .read-more {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 24px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .hero .read-more::after {
    content: '→';
    transition: transform .2s;
  }
  .hero:hover .read-more::after { transform: translateX(4px); }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0;
    border-top: 1px solid var(--rule-soft);
  }
  @media (max-width: 720px) {
    .grid { grid-template-columns: 1fr; }
  }
  .card {
    padding: 32px 28px;
    border-right: 1px solid var(--rule-soft);
    border-bottom: 1px solid var(--rule-soft);
    cursor: pointer;
    background: var(--paper);
    transition: background .2s;
  }
  .card:hover { background: var(--paper-alt); }
  .card:nth-child(2n) { border-right: none; }
  @media (max-width: 720px) {
    .card { border-right: none; padding: 28px 4px; }
  }
  .card .num {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-4);
    letter-spacing: 0.15em;
    margin-bottom: 12px;
  }
  .card h3 {
    font-family: var(--serif);
    font-size: 1.35rem;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 12px;
  }
  .card p {
    font-size: 0.92rem;
    line-height: 1.65;
    color: var(--ink-3);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Modal reader */
  .reader {
    position: fixed;
    inset: 0;
    background: rgba(20, 20, 20, 0.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: flex-start;
    justify-content: center;
    z-index: 100;
    padding: 40px 20px;
    overflow-y: auto;
  }
  .reader.open {
    display: flex;
    animation: fadein .25s ease;
  }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  .reader-panel {
    background: var(--paper);
    max-width: 760px;
    width: 100%;
    padding: 56px 56px 64px;
    border: 1px solid var(--rule-soft);
    box-shadow: 0 30px 80px rgba(0,0,0,0.25);
    position: relative;
  }
  @media (max-width: 600px) {
    .reader-panel { padding: 40px 24px 48px; }
  }
  .reader-close {
    position: absolute;
    top: 18px;
    right: 22px;
    background: none;
    border: none;
    font-size: 28px;
    color: var(--ink-3);
    cursor: pointer;
    line-height: 1;
    padding: 6px 10px;
    font-family: var(--serif);
  }
  .reader-close:hover { color: var(--ink); }
  .reader .kicker {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
  }
  .reader h2 {
    font-family: var(--serif);
    font-size: clamp(1.7rem, 4vw, 2.4rem);
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 20px;
  }
  .reader .byline {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-4);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--rule-soft);
    margin-bottom: 28px;
  }
  .reader .body {
    font-family: var(--serif);
    font-size: 1.08rem;
    line-height: 1.85;
    color: var(--ink-2);
  }
  .reader .body p {
    margin-bottom: 18px;
  }
  .reader .body p:first-letter {
    font-size: 3.6rem;
    font-weight: 700;
    float: left;
    line-height: 0.9;
    margin: 6px 10px 0 0;
    color: var(--accent);
    font-family: var(--serif);
  }

  /* Footer */
  .footer {
    border-top: 3px double var(--rule);
    margin-top: 80px;
    padding: 40px 24px 60px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-4);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 2;
  }
  .footer strong {
    color: var(--ink-2);
    font-weight: 600;
  }

  .loading, .error {
    text-align: center;
    padding: 80px 20px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-4);
    letter-spacing: 0.1em;
  }
  .error { color: var(--accent); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <span><span class="pulse"></span>LIVE · DISCORD SIGNAL</span>
    <span id="topbar-date">—</span>
  </div>
</div>

<header class="masthead">
  <h1>SIGNAL</h1>
  <div class="tagline">The frontier in your feed.</div>
  <div class="meta">
    <span id="masthead-date">—</span>
    <span class="dot">·</span>
    <span id="masthead-source">—</span>
    <span class="dot">·</span>
    <span>VOL. 001</span>
  </div>
</header>

<main class="container">
  <div id="content">
    <div class="loading">Loading signal…</div>
  </div>
</main>

<div class="reader" id="reader" role="dialog" aria-modal="true">
  <div class="reader-panel">
    <button class="reader-close" id="reader-close" aria-label="Close">×</button>
    <div class="kicker">SIGNAL · FEATURE</div>
    <h2 id="reader-title"></h2>
    <div class="byline" id="reader-byline"></div>
    <div class="body" id="reader-body"></div>
  </div>
</div>

<footer class="footer">
  <div><strong>SIGNAL</strong> · AI community intelligence</div>
  <div id="footer-meta">—</div>
</footer>

<script>
(async function() {
  const $ = (id) => document.getElementById(id);
  const content = $('content');

  function fmtDate(iso, opts = {}) {
    try {
      const d = new Date(iso);
      return d.toLocaleDateString('ko-KR', {
        year: 'numeric', month: 'long', day: 'numeric',
        weekday: opts.weekday ? 'long' : undefined
      });
    } catch { return iso; }
  }
  function fmtTime(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleString('ko-KR', {
        month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    } catch { return iso; }
  }
  function esc(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }
  function excerpt(s, n = 160) {
    const clean = s.replace(/^\*+\s*/, '').replace(/\*\*/g, '').split('\n')[0];
    return clean.length > n ? clean.slice(0, n).trim() + '…' : clean;
  }
  function paragraphs(body) {
    return body.replace(/\*\*/g, '').split(/\n{2,}|\n/).map(p => p.trim()).filter(Boolean);
  }

  let data;
  try {
    const res = await fetch('articles.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    data = await res.json();
  } catch (e) {
    content.innerHTML = `<div class="error">기사를 불러오지 못했습니다 · ${esc(e.message)}</div>`;
    return;
  }

  const articles = data.articles || [];
  const src = (data.source || 'discord').toUpperCase();
  const ch = data.channel ? `${data.guild || ''} #${data.channel}`.trim() : '';
  const gen = data.generated_at;
  const periodEnd = data.period && data.period.end;

  $('topbar-date').textContent = fmtTime(gen || periodEnd);
  $('masthead-date').textContent = fmtDate(gen || periodEnd, { weekday: true });
  $('masthead-source').textContent = `SOURCE: ${src}${ch ? ' · ' + ch.toUpperCase() : ''}`;
  $('footer-meta').textContent = `MODEL: ${(data.model || 'UNKNOWN').toUpperCase()} · GENERATED ${fmtTime(gen)} · ${articles.length} STORIES`;

  if (!articles.length) {
    content.innerHTML = `<div class="error">표시할 기사가 없습니다.</div>`;
    return;
  }

  const [featured, ...rest] = articles;

  let html = `
    <div class="section-label"><span>TOP STORY</span></div>
    <article class="hero" data-idx="0">
      <div class="kicker">LEAD · ${src}</div>
      <h2>${esc(featured.headline)}</h2>
      <p class="lede">${esc(excerpt(featured.body, 220))}</p>
      <div class="read-more">Read the full story</div>
    </article>
  `;

  if (rest.length) {
    html += `<div class="section-label"><span>MORE SIGNAL</span></div><div class="grid">`;
    rest.forEach((a, i) => {
      html += `
        <article class="card" data-idx="${i + 1}">
          <div class="num">No. ${String(i + 2).padStart(2, '0')}</div>
          <h3>${esc(a.headline)}</h3>
          <p>${esc(excerpt(a.body, 180))}</p>
        </article>
      `;
    });
    html += `</div>`;
  }

  content.innerHTML = html;

  // Reader modal
  const reader = $('reader');
  const readerTitle = $('reader-title');
  const readerBody = $('reader-body');
  const readerByline = $('reader-byline');

  function openReader(idx) {
    const a = articles[idx];
    if (!a) return;
    readerTitle.textContent = a.headline;
    readerByline.textContent = `${src}${ch ? ' · ' + ch : ''} · ${fmtDate(gen)}`;
    readerBody.innerHTML = paragraphs(a.body).map(p => `<p>${esc(p)}</p>`).join('');
    reader.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeReader() {
    reader.classList.remove('open');
    document.body.style.overflow = '';
  }
  $('reader-close').addEventListener('click', closeReader);
  reader.addEventListener('click', (e) => { if (e.target === reader) closeReader(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeReader(); });

  document.querySelectorAll('[data-idx]').forEach(el => {
    el.addEventListener('click', () => openReader(Number(el.dataset.idx)));
  });
})();
</script>

</body>
</html>
