<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>First Light AI — ARCHIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --paper: #faf8f3;
    --paper-alt: #f3f0e7;
    --ink: #141414;
    --ink-2: #2b2b2b;
    --ink-3: #5a5a5a;
    --ink-4: #8a8a8a;
    --rule: #1a1a1a;
    --rule-soft: #d9d5c7;
    --accent: #b91c1c;
    --serif: 'Noto Serif KR', 'Times New Roman', serif;
    --sans: 'Noto Sans KR', -apple-system, 'Segoe UI', sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--sans); background: var(--paper); color: var(--ink); -webkit-font-smoothing: antialiased; line-height: 1.6; }

  .topbar {
    border-bottom: 1px solid var(--rule-soft);
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.08em; color: var(--ink-3);
  }
  .topbar-inner {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 24px; max-width: 1120px; margin: 0 auto;
    text-transform: uppercase;
  }
  .back-link { color: var(--ink-3); text-decoration: none; }
  .back-link:hover { color: var(--accent); }

  .masthead {
    text-align: center;
    padding: 48px 24px 24px;
    border-bottom: 3px double var(--rule);
    max-width: 1120px;
    margin: 0 auto;
  }
  .masthead h1 {
    font-family: var(--serif);
    font-weight: 900;
    font-size: clamp(2.4rem, 7vw, 4rem);
    letter-spacing: -0.04em;
    line-height: 0.9;
  }
  .masthead .sub {
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-4); margin-top: 14px;
    letter-spacing: 0.2em; text-transform: uppercase;
  }

  .container { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

  .filter-bar {
    display: flex; gap: 6px; margin-bottom: 28px;
    border-bottom: 1px solid var(--rule-soft);
    padding-bottom: 16px; flex-wrap: wrap;
  }
  .filter-btn {
    font-family: var(--mono); font-size: 11px;
    font-weight: 600; letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 6px 14px;
    background: transparent;
    border: 1px solid var(--rule-soft);
    color: var(--ink-3);
    cursor: pointer;
    transition: all .15s;
  }
  .filter-btn:hover { border-color: var(--ink); color: var(--ink); }
  .filter-btn.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .entry {
    display: grid;
    grid-template-columns: 100px 70px 1fr;
    gap: 24px;
    align-items: start;
    padding: 22px 0;
    border-bottom: 1px solid var(--rule-soft);
    cursor: pointer;
    transition: background .15s;
  }
  .entry:hover { background: var(--paper-alt); }
  @media (max-width: 720px) {
    .container { padding: 28px 24px; }
    .entry {
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px 14px;
      padding: 24px 0;
    }
    .entry .when { grid-column: 1; grid-row: 1; }
    .entry .badge { grid-column: 2; grid-row: 1; justify-self: end; }
    .entry .content { grid-column: 1 / -1; min-width: 0; }
  }
  .entry .when {
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-4); letter-spacing: 0.08em;
    line-height: 1.5;
  }
  .entry .badge {
    font-family: var(--mono); font-size: 10px;
    font-weight: 700; letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 3px 8px;
    display: inline-block;
    align-self: start;
  }
  .badge.top { background: var(--accent); color: white; }
  .badge.rumor { background: #f97316; color: white; }
  .badge.trust-low { background: transparent; color: var(--ink-4); border: 1px solid var(--rule-soft); }

  /* 날짜 구분선 */
  .date-divider {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    color: var(--ink-2);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 24px 0 10px;
    border-top: 2px solid var(--ink);
    margin-top: 18px;
  }
  .date-divider:first-child { margin-top: 0; padding-top: 4px; border-top: none; }
  .badge.main { background: var(--ink); color: var(--paper); }
  .badge.side { background: transparent; color: var(--ink-3); border: 1px solid var(--rule-soft); }
  .entry .content h3 {
    font-family: var(--serif);
    font-size: 1.15rem;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  .entry .content p {
    font-size: 0.9rem; line-height: 1.6;
    color: var(--ink-3);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: keep-all;
    overflow-wrap: break-word;
  }

  /* ── Reader modal ── */
  .reader {
    position: fixed; inset: 0;
    background: rgba(20,20,20,0.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none; align-items: flex-start; justify-content: center;
    z-index: 100; padding: 40px 20px; overflow-y: auto;
  }
  .reader.open { display: flex; animation: fadein .25s ease; }
  @keyframes fadein { from{opacity:0} to{opacity:1} }
  .reader-panel {
    background: var(--paper); max-width: 760px; width: 100%;
    padding: 56px 56px 64px;
    border: 1px solid var(--rule-soft);
    box-shadow: 0 30px 80px rgba(0,0,0,0.25);
    position: relative;
  }
  @media (max-width: 600px) { .reader-panel { padding: 40px 24px 48px; } }
  .reader-close {
    position: absolute; top: 18px; right: 22px;
    background: none; border: none;
    font-size: 28px; color: var(--ink-3);
    cursor: pointer; padding: 6px 10px;
    font-family: var(--serif); line-height: 1;
  }
  .reader-close:hover { color: var(--ink); }
  .reader .kicker {
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 18px;
  }
  .reader h2 {
    font-family: var(--serif);
    font-size: clamp(1.7rem, 4vw, 2.4rem);
    font-weight: 700; line-height: 1.2;
    letter-spacing: -0.02em; margin-bottom: 20px;
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  .reader .byline {
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-4); letter-spacing: 0.1em;
    text-transform: uppercase;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--rule-soft);
    margin-bottom: 28px;
  }
  .reader .body { font-family: var(--serif); font-size: 1.08rem; line-height: 1.85; color: var(--ink-2); }
  .reader .body p {
    margin-bottom: 18px;
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  .reader .body p:first-of-type::first-letter {
    font-size: 3.6rem; font-weight: 700; float: left;
    line-height: 0.9; margin: 6px 10px 0 0;
    color: var(--accent); font-family: var(--serif);
  }

  .loading, .error, .empty {
    text-align: center; padding: 80px 20px;
    font-family: var(--mono); font-size: 13px;
    color: var(--ink-4); letter-spacing: 0.1em;
  }
  .error { color: var(--accent); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <a href="index.html" id="back-link" class="back-link">← BACK TO FRONT</a>
    <span id="topbar-date">—</span>
  </div>
</div>

<header class="masthead">
  <h1>ARCHIVE</h1>
  <div class="sub">전체 보관 · 시간순 전체 목록</div>
</header>

<main class="container">
  <div class="filter-bar">
    <button class="filter-btn active" data-f="all">전체</button>
    <button class="filter-btn" data-f="top">TOP</button>
    <button class="filter-btn" data-f="main">MAIN</button>
    <button class="filter-btn" data-f="side">SIDE</button>
  </div>
  <div id="list">
    <div class="loading">Loading archive…</div>
  </div>
</main>

<div class="reader" id="reader" role="dialog" aria-modal="true">
  <div class="reader-panel">
    <button class="reader-close" id="reader-close">×</button>
    <div class="kicker">FIRST LIGHT AI · FEATURE</div>
    <h2 id="reader-title"></h2>
    <div class="byline" id="reader-byline"></div>
    <div class="body" id="reader-body"></div>
  </div>
</div>

<script id="articles-data" type="application/json">__ARTICLES_JSON__</script>
<script>
(async function() {
  const $ = (id) => document.getElementById(id);

  // htmlpreview wrapper fix
  (function fixBackLink() {
    const here = window.location.href;
    if (!here.includes('htmlpreview.github.io')) return;
    const q = window.location.search.slice(1) + window.location.hash.slice(1);
    const raw = q.startsWith('http') ? q : '';
    if (!raw) return;
    const indexRaw = raw.replace(/archive\.html(\?.*)?$/, 'index.html');
    const wrapped = 'https://htmlpreview.github.io/?' + indexRaw;
    const el = document.getElementById('back-link');
    if (el) el.href = wrapped;
  })();
  function esc(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function formatInlineText(s) {
    return esc(s).replace(/([A-Za-z0-9])\/([A-Za-z0-9])/g, '$1&#8288;/&#8288;$2');
  }
  function fmtDT(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleString('ko-KR', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    } catch { return iso; }
  }
  function excerpt(s, n = 140) {
    const clean = String(s).replace(/^\*+\s*/, '').replace(/\*\*/g, '').split('\n')[0];
    return clean.length > n ? clean.slice(0, n).trim() + '…' : clean;
  }
  function paragraphs(body) {
    return String(body).replace(/\*\*/g, '').split(/\n{2,}|\n/).map(p => p.trim()).filter(Boolean);
  }

  let data;
  const inlineEl = document.getElementById('articles-data');
  const inlineRaw = inlineEl ? inlineEl.textContent.trim() : '';
  if (inlineRaw && !inlineRaw.startsWith('__')) {
    try { data = JSON.parse(inlineRaw); }
    catch (e) { $('list').innerHTML = `<div class="error">파싱 실패 · ${esc(e.message)}</div>`; return; }
  } else {
    try {
      const res = await fetch('articles.json?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      data = await res.json();
    } catch (e) {
      $('list').innerHTML = `<div class="error">로드 실패 · ${esc(e.message)}</div>`; return;
    }
  }

  const all = (data.articles || []).slice()
    .sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));
  $('topbar-date').textContent = fmtDT(data.generated_at);

  let filter = 'all';
  function render() {
    const rows = filter === 'all' ? all : all.filter(a => a.placement === filter);
    if (!rows.length) {
      $('list').innerHTML = `<div class="empty">해당하는 기사가 없습니다.</div>`;
      return;
    }
    // 날짜 구분선 삽입 (created_at 기준, 날짜 바뀔 때마다)
    function dateKey(iso) {
      try {
        const d = new Date(iso);
        return d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
      } catch { return iso; }
    }
    let prevKey = null;
    const parts = [];
    rows.forEach(a => {
      const k = dateKey(a.created_at);
      if (k !== prevKey) {
        parts.push(`<div class="date-divider">${esc(k)}</div>`);
        prevKey = k;
      }
      const tags = [];
      if (a.category === 'rumor') tags.push('<span class="badge rumor">찌라시</span>');
      if (a.trust === 'low') tags.push('<span class="badge trust-low">낮은 신뢰</span>');
      parts.push(`
      <article class="entry" data-id="${esc(a.id)}">
        <div class="when">${fmtDT(a.created_at)}</div>
        <span class="badge ${esc(a.placement || 'side')}">${esc((a.placement || 'side').toUpperCase())}</span>
        <div class="content">
          <h3>${formatInlineText(a.headline)} ${tags.join(' ')}</h3>
          <p>${formatInlineText(excerpt(a.body))}</p>
        </div>
      </article>`);
    });
    $('list').innerHTML = parts.join('');
    document.querySelectorAll('[data-id]').forEach(el => {
      el.addEventListener('click', () => openReader(el.dataset.id));
    });
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.f;
      render();
    });
  });

  const byId = Object.fromEntries(all.map(a => [a.id, a]));
  const reader = $('reader');
  function openReader(id) {
    const a = byId[id]; if (!a) return;
    $('reader-title').innerHTML = formatInlineText(a.headline);
    $('reader-byline').textContent = `FIRST LIGHT AI · ${fmtDT(a.created_at)} · ${(a.placement||'side').toUpperCase()}`;
    $('reader-body').innerHTML = paragraphs(a.body).map(p => `<p>${formatInlineText(p)}</p>`).join('');
    reader.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeReader() {
    reader.classList.remove('open');
    document.body.style.overflow = '';
  }
  $('reader-close').addEventListener('click', closeReader);
  reader.addEventListener('click', e => { if (e.target === reader) closeReader(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeReader(); });

  render();
})();
</script>
</body>
</html>
