name: Deploy Digest to GitHub Pages
# Deploys dev publish commits without writing generated artifacts to main.

on:
  push:
    branches: [dev]
    paths:
      - index.html
      - archive.html
      - articles.json
      - exports/articles/**
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        startsWith(github.event.head_commit.message, 'chore: publish First Light AI')
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build static artifact
        run: |
          mkdir -p _site
          cp index.html archive.html articles.json .nojekyll _site/
          if [ -d exports ]; then cp -R exports _site/exports; fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
