<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="AI 커뮤니티의 첫 빛을 추적합니다."/>
<title>First Light AI — 데일리 브리핑</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --paper: #faf8f3;
    --paper-alt: #f3f0e7;
    --ink: #141414;
    --ink-2: #2b2b2b;
    --ink-3: #5a5a5a;
    --ink-4: #8a8a8a;
    --rule: #1a1a1a;
    --rule-soft: #d9d5c7;
    --accent: #b91c1c;
    --accent-soft: #fef2f2;
    --serif: 'Noto Serif KR', 'Times New Roman', serif;
    --sans: 'Noto Sans KR', -apple-system, 'Segoe UI', sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; overflow-x: hidden; }
  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ── Topbar ── */
  .topbar {
    border-bottom: 1px solid var(--rule-soft);
    background: var(--paper);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--ink-3);
  }
  .topbar-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 24px;
    max-width: 1320px;
    margin: 0 auto;
    text-transform: uppercase;
  }
  .topbar .pulse {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); margin-right: 6px; vertical-align: middle;
    animation: pulse 2s infinite;
  }
  .topbar-right {
    display: inline-flex; align-items: center; gap: 14px;
  }
  .topbar-link {
    color: var(--accent); text-decoration: none;
    font-weight: 600; letter-spacing: 0.12em;
    padding: 3px 8px; border: 1px solid var(--accent);
    border-radius: 2px;
    transition: all .15s;
  }
  .topbar-link:hover {
    background: var(--accent); color: var(--paper);
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Masthead ── */
  .masthead {
    position: relative;
    overflow: visible;
    text-align: center;
    padding: 48px 24px 28px;
    border-bottom: 3px double var(--rule);
    max-width: 1320px;
    margin: 0 auto;
  }
	  .masthead h1 {
	    font-family: var(--serif);
	    font-weight: 900;
	    font-size: 5rem;
	    letter-spacing: -0.02em;
	    line-height: 0.9;
	    color: var(--ink);
	  }
	  @media (max-width: 720px) {
	    .masthead h1 { font-size: 2.6rem; }
	  }
  .masthead .tagline {
    font-family: var(--serif);
    font-style: italic;
    font-size: 1.05rem;
    color: var(--ink-3);
    margin-top: 14px;
    font-weight: 400;
  }
  .masthead .meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-4);
    margin-top: 18px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .masthead .meta .dot { margin: 0 10px; opacity: 0.5; }

  /* ── Layout: sides + center ── */
  .layout {
    max-width: 1560px;
    margin: 0 auto;
    padding: 32px 24px 0;
    display: grid;
    grid-template-columns: 300px minmax(0, 820px) 300px;
    gap: 44px;
    justify-content: center;
    align-items: start;
  }
  @media (max-width: 1280px) {
    .layout {
      display: flex;
      flex-direction: column;
      grid-template-columns: 1fr;
      padding: 32px 18px 0;
      gap: 0;
    }
    .center { order: 1; }
    .side-left { order: 2; margin-top: 40px; }
    .side-right { order: 3; margin-top: 0; }
  }

  /* ── Side columns (larger, no labels) ── */
  .side { }
  @media (max-width: 1280px) {
    .side { position: static; }
  }
  .side-item {
    padding: 18px 0;
    border-bottom: 1px solid var(--rule-soft);
    cursor: pointer;
    transition: opacity .15s;
  }
  .side-item:first-child { padding-top: 4px; }
  .side-item:hover { opacity: 0.65; }
  .side-item:last-child { border-bottom: none; }
  .side-item .num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-4);
    letter-spacing: 0.12em;
    margin-bottom: 6px;
  }
  .side-item .t {
    font-family: var(--serif);
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.35;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .side-item .snip {
    font-size: 0.82rem;
    line-height: 1.55;
    color: var(--ink-3);
    margin-top: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Section heading (center) ── */
  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 40px 0 24px;
  }
  .section-label:first-child { margin-top: 0; }
  .section-label::before, .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--rule-soft);
  }

  /* ── Tag badges ── */
  .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 2px;
    margin-right: 4px;
    vertical-align: middle;
  }
  .tag.rumor { background: #f97316; color: white; }
  .tag.news { display: none; }  /* news는 기본이라 표시 안 함 */
  .tag.trust-low { background: transparent; color: var(--ink-4); border: 1px solid var(--rule-soft); }
  .tag.trust-high { display: none; }  /* high는 기본 표시 안 함 */

  /* ── Hero (TOP) ── */
  .hero {
    padding: 4px 0 40px;
    cursor: pointer;
    transition: opacity .2s;
  }
  .hero:hover { opacity: 0.88; }
  .hero .kicker {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .hero h2 {
    font-family: var(--serif);
    font-size: clamp(1.8rem, 4.5vw, 2.8rem);
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 18px;
  }
  .hero .lede {
    font-family: var(--serif);
    font-size: 1.12rem;
    line-height: 1.7;
    color: var(--ink-2);
  }
  .hero .read-more {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 22px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .hero .read-more::after { content: '→'; transition: transform .2s; }
  .hero:hover .read-more::after { transform: translateX(4px); }

  /* ── Daily visual candidate lab ── */
  .daily-ribbon-stage {
    position: absolute;
    top: 128px;
    left: max(18px, calc(50% - 530px));
    width: min(1060px, calc(100vw - 36px));
    height: 386px;
    margin: 0;
    padding: 0;
    z-index: 60;
    pointer-events: none;
  }
  .daily-ribbon-stage[hidden] { display: none; }
  .summary-physics {
    position: relative;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .summary-physics.open {}
  .physics-lab-panel {
    pointer-events: auto;
    text-align: left;
    background:
      radial-gradient(circle at 12% 0%, rgba(255,255,255,.78), transparent 28%),
      linear-gradient(180deg, rgba(250,248,243,.98), rgba(238,235,226,.95)),
      repeating-linear-gradient(90deg, rgba(20,20,20,.026) 0 1px, transparent 1px 18px);
    border: 1px solid var(--rule);
    border-radius: 6px;
    box-shadow: 0 28px 70px rgba(20,20,20,.16), inset 0 1px 0 rgba(255,255,255,.75);
    padding: 12px;
  }
  .physics-lab-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 16px;
    padding: 0 2px 10px;
    border-bottom: 1px solid var(--rule-soft);
    margin-bottom: 10px;
  }
  .physics-lab-kicker {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 800;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .physics-lab-note {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: .1em;
    color: var(--ink-4);
    text-transform: uppercase;
  }
  .physics-lab-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 9px;
  }
  .physics-engine-card {
    position: relative;
    min-height: 154px;
    border: 1px solid var(--rule-soft);
    border-radius: 6px;
    background:
      radial-gradient(circle at 18% 14%, rgba(255,255,255,.7), transparent 34%),
      linear-gradient(145deg, rgba(255,255,255,.5), rgba(20,20,20,.045)),
      color-mix(in srgb, var(--paper) 94%, white);
    color: var(--ink);
    overflow: hidden;
    cursor: grab;
    touch-action: none;
    user-select: none;
    transform-style: preserve-3d;
    perspective: 620px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.68), 0 12px 24px rgba(20,20,20,.08);
  }
  .physics-engine-card:active { cursor: grabbing; }
  .physics-engine-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(115deg, rgba(255,255,255,.22), transparent 32%, rgba(20,20,20,.08) 74%, transparent),
      radial-gradient(circle at 78% 86%, rgba(20,20,20,.1), transparent 36%);
    pointer-events: none;
    z-index: 1;
  }
  .physics-engine-card[data-engine-status="ready"] {
    border-color: color-mix(in srgb, var(--accent) 54%, var(--rule-soft));
  }
  .engine-viewport {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .engine-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  .engine-caption {
    position: absolute;
    left: 10px;
    right: 10px;
    bottom: 8px;
    z-index: 4;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 10px;
    pointer-events: none;
  }
  .engine-name {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 900;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .engine-hint {
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ink-4);
    text-align: right;
  }
  .physics-engine-card[data-engine-status="drawing"] .engine-name::after {
    content: ' · drawing';
    color: var(--ink-4);
    font-weight: 700;
  }
  .summary-sheet {
    position: fixed;
    top: 118px;
    right: max(24px, calc((100vw - 920px) / 2));
    width: min(560px, calc(100vw - 132px));
    max-height: calc(100vh - 152px);
    margin: 0;
    padding: 0 28px;
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: color-mix(in srgb, var(--paper) 96%, white);
    box-shadow: 0 24px 70px rgba(20,20,20,.18);
    opacity: 0;
    overflow: auto;
    pointer-events: none;
    text-align: left;
    transform: translateX(18px) translateY(-8px);
    z-index: 88;
    transition:
      opacity .28s ease,
      transform .55s cubic-bezier(.18,.72,.18,1),
      padding .55s cubic-bezier(.18,.72,.18,1);
  }
  .summary-physics.open .summary-sheet {
    opacity: 1;
    padding: 28px;
    pointer-events: auto;
    transform: translateX(0) translateY(0);
  }
  .summary-sheet-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--rule-soft);
    margin-bottom: 24px;
  }
  .summary-sheet-kicker {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .summary-sheet-title {
    font-family: var(--serif);
    font-size: clamp(1.55rem, 3.2vw, 2.2rem);
    line-height: 1.12;
    font-weight: 900;
    letter-spacing: 0;
    word-break: keep-all;
    overflow-wrap: break-word;
    text-wrap: balance;
  }
  .summary-close {
    flex: 0 0 auto;
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: transparent;
    color: var(--ink);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    padding: 9px 12px;
    cursor: pointer;
  }
  .summary-close:hover { background: var(--ink); color: var(--paper); }
  .summary-copy p {
    font-family: var(--serif);
    font-size: clamp(1.02rem, 2vw, 1.13rem);
    line-height: 1.9;
    color: var(--ink-2);
    margin-bottom: 18px;
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  .summary-copy p:last-child { margin-bottom: 0; }
  .summary-copy p:first-of-type::first-letter {
    font-size: 3.2rem;
    line-height: .9;
    float: left;
    font-weight: 900;
    color: var(--accent);
    margin: 8px 10px 0 0;
  }
  @media (max-width: 720px) {
    .daily-ribbon-stage {
      top: 156px;
      left: 8px;
      right: auto;
      width: calc(100vw - 16px);
      height: 636px;
    }
    .physics-lab-panel { padding: 8px; }
    .physics-lab-head { display: block; }
    .physics-lab-note { margin-top: 5px; }
    .physics-lab-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
      padding-bottom: 0;
    }
    .physics-engine-card {
      min-height: 91px;
      scroll-snap-align: none;
    }
    .engine-caption {
      left: 7px;
      right: 7px;
      bottom: 5px;
      gap: 5px;
    }
    .engine-name {
      font-size: 8px;
      letter-spacing: .06em;
    }
    .engine-hint {
      font-size: 7px;
      letter-spacing: .06em;
    }
    .summary-sheet {
      top: max(8px, env(safe-area-inset-top));
      right: 8px;
      left: 8px;
      width: auto;
      max-height: calc(100vh - max(8px, env(safe-area-inset-top)) - 48px);
      max-height: calc(100dvh - max(8px, env(safe-area-inset-top)) - max(48px, env(safe-area-inset-bottom)));
      padding: 0 18px;
      border-radius: 6px;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    .summary-physics.open .summary-sheet {
      padding: 18px 18px max(56px, calc(34px + env(safe-area-inset-bottom)));
    }
    .summary-sheet-head {
      display: block;
    }
    .summary-close {
      margin-top: 16px;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .physics-engine-card,
    .summary-sheet,
    .summary-physics {
      transition: none;
    }
  }

  /* ── MAIN grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0;
  }
  @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
  .card {
    padding: 28px 24px;
    border-right: 1px solid var(--rule-soft);
    border-bottom: 1px solid var(--rule-soft);
    cursor: pointer;
    transition: background .2s;
  }
  .card:hover { background: var(--paper-alt); }
  .card:nth-child(2n) { border-right: none; }
  @media (max-width: 640px) {
    .card { border-right: none; padding: 24px 4px; }
  }
  .card .num {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-4);
    letter-spacing: 0.15em;
    margin-bottom: 10px;
  }
  .card h3 {
    font-family: var(--serif);
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 10px;
  }
  .card p {
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--ink-3);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── More button ── */
  .more-wrap {
    text-align: center;
    padding: 56px 24px 24px;
  }
  .more-btn {
    display: inline-block;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    padding: 14px 32px;
    border: 1px solid var(--ink);
    background: var(--paper);
    transition: all .2s;
  }
  .more-btn:hover { background: var(--ink); color: var(--paper); }

  /* ── Modal reader ── */
  .reader {
    position: fixed; inset: 0;
    background: rgba(20, 20, 20, 0.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: flex-start;
    justify-content: center;
    z-index: 100;
    padding: 40px 20px;
    overflow-y: auto;
  }
  .reader.open { display: flex; animation: fadein .25s ease; }
  @keyframes fadein { from{opacity:0} to{opacity:1} }
  .reader-panel {
    background: var(--paper);
    max-width: 760px; width: 100%;
    padding: 56px 56px 64px;
    border: 1px solid var(--rule-soft);
    box-shadow: 0 30px 80px rgba(0,0,0,0.25);
    position: relative;
  }
  @media (max-width: 600px) {
    .reader-panel { padding: 40px 24px 48px; }
  }
  .reader-close {
    position: absolute; top: 18px; right: 22px;
    background: none; border: none;
    font-size: 28px; color: var(--ink-3);
    cursor: pointer; line-height: 1;
    padding: 6px 10px; font-family: var(--serif);
  }
  .reader-close:hover { color: var(--ink); }
  .reader .kicker {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
  }
  .reader h2 {
    font-family: var(--serif);
    font-size: clamp(1.7rem, 4vw, 2.4rem);
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 20px;
  }
  .reader .byline {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-4);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--rule-soft);
    margin-bottom: 28px;
  }
  .reader .body {
    font-family: var(--serif);
    font-size: 1.08rem;
    line-height: 1.85;
    color: var(--ink-2);
  }
  .reader .body p {
    margin-bottom: 18px;
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  .reader .body p:first-of-type::first-letter {
    font-size: 3.6rem;
    font-weight: 700;
    float: left;
    line-height: 0.9;
    margin: 6px 10px 0 0;
    color: var(--accent);
    font-family: var(--serif);
  }

  /* ── Footer ── */
  .footer {
    border-top: 3px double var(--rule);
    margin-top: 40px;
    padding: 40px 24px 60px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-4);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 2;
    max-width: 1320px;
    margin-left: auto;
    margin-right: auto;
  }
  .footer strong { color: var(--ink-2); font-weight: 600; }

  .loading, .error, .empty {
    text-align: center;
    padding: 60px 20px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-4);
    letter-spacing: 0.1em;
  }
  .error { color: var(--accent); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <span><span class="pulse"></span>LIVE · FIRST LIGHT AI</span>
    <span class="topbar-right">
      <span id="topbar-date">—</span>

<script>
(async function() {
  const $ = (id) => document.getElementById(id);

  // htmlpreview wraps the page — relative links break out of the wrapper.
  // Detect and rewrite archive link to go through htmlpreview too.
  (function fixArchiveLinks() {
    const here = window.location.href;
    const isPreview = here.includes('htmlpreview.github.io');
    if (!isPreview) return;
    // figure out the base gist raw URL from query string
    const q = window.location.search.slice(1) + window.location.hash.slice(1);
    const raw = q.startsWith('http') ? q : '';
    if (!raw) return;
    const archiveRaw = raw.replace(/index\.html(\?.*)?$/, 'archive.html');
    const wrapped = 'https://htmlpreview.github.io/?' + archiveRaw;
    const top = document.getElementById('archive-link-top');
    const bot = document.getElementById('archive-link-bottom');
    if (top) top.href = wrapped;
    if (bot) bot.href = wrapped;
  })();

  function fmtDate(iso, opts = {}) {
    try {
      const d = new Date(iso);
      return d.toLocaleDateString('ko-KR', {
        year: 'numeric', month: 'long', day: 'numeric',
        weekday: opts.weekday ? 'long' : undefined
      });
    } catch { return iso; }
  }
  function fmtTime(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleString('ko-KR', {
        month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    } catch { return iso; }
  }
  function esc(s) {
    return String(s || '').replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }
  function formatInlineText(s) {
    return esc(s).replace(/([A-Za-z0-9])\/([A-Za-z0-9])/g, '$1&#8288;/&#8288;$2');
  }
  function excerpt(s, n = 160) {
    const clean = String(s).replace(/^\*+\s*/, '').replace(/\*\*/g, '').split('\n')[0];
    return clean.length > n ? clean.slice(0, n).trim() + '…' : clean;
  }
  function paragraphs(body) {
    return String(body).replace(/\*\*/g, '').split(/\n{2,}|\n/).map(p => p.trim()).filter(Boolean);
  }
  function clamp(n, min, max) {
    return Math.max(min, Math.min(max, n));
  }
  const PHYSICS_REFERENCES = {
    verlet: { name: 'verlet-js', url: 'https://github.com/subprotocol/verlet-js' },
    cloth: { name: 'breeze', url: 'https://github.com/holtsetio/breeze' },
    rigid: { name: 'matter-js', url: 'https://github.com/liabru/matter-js' },
    soft: { name: 'Oimo.js', url: 'https://github.com/lo-th/Oimo.js' },
    cradle: { name: 'p2.js', url: 'https://github.com/schteppe/p2.js' },
    fluid: { name: 'WebGL Fluid', url: 'https://github.com/PavelDoGreat/WebGL-Fluid-Simulation' },
    magnetic: { name: 'matter-attractors', url: 'https://github.com/liabru/matter-attractors' },
    torsion: { name: 'ammo.js', url: 'https://github.com/kripken/ammo.js' },
    gyro: { name: 'cannon.js', url: 'https://github.com/schteppe/cannon.js' },
    suspension: { name: 'rapier.js', url: 'https://github.com/dimforge/rapier.js' },
  };

  const PHYSICS_CANDIDATES = [
    { id: 'verlet-rope', label: 'Verlet Rope', hint: 'constraint chain', ref: 'verlet', accent: '#b4232f' },
    { id: 'pbd-cloth', label: 'PBD Cloth', hint: 'pinned fabric', ref: 'cloth', accent: '#0f766e' },
    { id: 'rigid-hinge', label: 'Rigid Hinge', hint: 'angular body', ref: 'rigid', accent: '#a16207' },
    { id: 'soft-body', label: 'Soft Body', hint: 'pressure mesh', ref: 'soft', accent: '#be185d' },
    { id: 'newton-cradle', label: 'Cradle', hint: 'impact transfer', ref: 'cradle', accent: '#334155' },
    { id: 'fluid-splat', label: 'Fluid Splat', hint: 'vortex field', ref: 'fluid', accent: '#0369a1' },
    { id: 'magnetic-field', label: 'Magnetic Field', hint: 'inverse force', ref: 'magnetic', accent: '#7c2d12' },
    { id: 'torsion-strip', label: 'Torsion Strip', hint: 'twist joints', ref: 'torsion', accent: '#4c1d95' },
    { id: 'gyro-precession', label: 'Gyro', hint: 'precession', ref: 'gyro', accent: '#155e75' },
    { id: 'suspension-bounce', label: 'Suspension', hint: 'spring damper', ref: 'suspension', accent: '#166534' },
  ];

  function blendHex(hex, other, amount) {
    const parse = (value) => {
      const raw = value.replace('#', '');
      return [
        parseInt(raw.slice(0, 2), 16),
        parseInt(raw.slice(2, 4), 16),
        parseInt(raw.slice(4, 6), 16),
      ];
    };
    const a = parse(hex);
    const b = parse(other);
    return `rgb(${a.map((v, i) => Math.round(v * (1 - amount) + b[i] * amount)).join(',')})`;
  }

  function resizeCanvas(canvas) {
    const rect = canvas.getBoundingClientRect();
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const width = Math.max(1, Math.round(rect.width * dpr));
    const height = Math.max(1, Math.round(rect.height * dpr));
    if (canvas.width !== width || canvas.height !== height) {
      canvas.width = width;
      canvas.height = height;
    }
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { ctx, w: rect.width || 190, h: rect.height || 150, dpr };
  }

  function roundRect(ctx, x, y, w, h, r) {
    const radius = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.arcTo(x + w, y, x + w, y + h, radius);
    ctx.arcTo(x + w, y + h, x, y + h, radius);
    ctx.arcTo(x, y + h, x, y, radius);
    ctx.arcTo(x, y, x + w, y, radius);
    ctx.closePath();
  }

  function modelKey(w, h) {
    return `${Math.round(w)}x${Math.round(h)}`;
  }

  function particle(x, y, z = 0, pinned = false) {
    return { x, y, z, px: x, py: y, pz: z, pinned };
  }

  function verletIntegrate(p, ax, ay, az, drag = .985) {
    if (p.pinned) return;
    const vx = (p.x - p.px) * drag;
    const vy = (p.y - p.py) * drag;
    const vz = (p.z - p.pz) * drag;
    p.px = p.x;
    p.py = p.y;
    p.pz = p.z;
    p.x += vx + ax;
    p.y += vy + ay;
    p.z += vz + az;
  }

  function solveDistance(a, b, target, stiffness = 1) {
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const dz = b.z - a.z;
    const dist = Math.hypot(dx, dy, dz) || .0001;
    const diff = (dist - target) / dist * stiffness;
    const ox = dx * diff * .5;
    const oy = dy * diff * .5;
    const oz = dz * diff * .5;
    if (!a.pinned) { a.x += ox; a.y += oy; a.z += oz; }
    if (!b.pinned) { b.x -= ox; b.y -= oy; b.z -= oz; }
  }

  function project3d(x, y, z, w, h, camera = 370) {
    const scale = camera / (camera + z);
    return { x: w * .5 + x * scale, y: h * .5 + y * scale, scale };
  }

  function rotate3d(pt, rx, ry, rz) {
    let { x, y, z } = pt;
    const cx = Math.cos(rx), sx = Math.sin(rx);
    const cy = Math.cos(ry), sy = Math.sin(ry);
    const cz = Math.cos(rz), sz = Math.sin(rz);
    let y1 = y * cx - z * sx;
    let z1 = y * sx + z * cx;
    y = y1; z = z1;
    let x1 = x * cy + z * sy;
    z1 = -x * sy + z * cy;
    x = x1; z = z1;
    x1 = x * cz - y * sz;
    y1 = x * sz + y * cz;
    return { x: x1, y: y1, z };
  }

  function pathPoints(ctx, pts) {
    ctx.beginPath();
    pts.forEach((p, i) => {
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });
    ctx.closePath();
  }

  function drawEnvironmentReflection(ctx, pts, phase = 0, alpha = .32) {
    ctx.save();
    pathPoints(ctx, pts);
    ctx.clip();
    const minX = Math.min(...pts.map(p => p.x));
    const maxX = Math.max(...pts.map(p => p.x));
    const minY = Math.min(...pts.map(p => p.y));
    const maxY = Math.max(...pts.map(p => p.y));
    const span = Math.max(maxX - minX, 20);
    for (let i = -1; i < 4; i++) {
      const x = minX - span * .5 + i * span * .42 + Math.sin(phase + i) * 5;
      const grad = ctx.createLinearGradient(x, minY, x + span * .26, maxY);
      grad.addColorStop(0, 'rgba(255,255,255,0)');
      grad.addColorStop(.34, `rgba(255,255,255,${alpha})`);
      grad.addColorStop(.48, `rgba(255,255,255,${alpha * .18})`);
      grad.addColorStop(1, 'rgba(20,20,20,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(x, minY - 18);
      ctx.lineTo(x + span * .18, minY - 18);
      ctx.lineTo(x + span * .56, maxY + 18);
      ctx.lineTo(x + span * .38, maxY + 18);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  function drawFresnelHighlight(ctx, pts, color = 'rgba(255,255,255,.76)', width = 1.35) {
    ctx.save();
    pathPoints(ctx, pts);
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.stroke();
    ctx.restore();
  }

  function drawReferenceBadge(ctx, candidate, w, h) {
    const ref = PHYSICS_REFERENCES[candidate.ref];
    if (!ref) return;
    ctx.save();
    ctx.font = '700 7px JetBrains Mono, monospace';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.fillStyle = 'rgba(20,20,20,.44)';
    ctx.fillText(ref.name, w - 8, h - 7);
    ctx.restore();
  }

  function drawLabBackground(ctx, candidate, t, w, h) {
    ctx.clearRect(0, 0, w, h);
    const bg = ctx.createLinearGradient(0, 0, w, h);
    bg.addColorStop(0, 'rgba(255,255,255,.72)');
    bg.addColorStop(.46, 'rgba(245,242,232,.5)');
    bg.addColorStop(1, 'rgba(20,20,20,.08)');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);
    ctx.save();
    ctx.globalAlpha = .2;
    ctx.strokeStyle = candidate.accent;
    ctx.lineWidth = .55;
    for (let x = -h; x < w + h; x += 18) {
      ctx.beginPath();
      ctx.moveTo(x + Math.sin(t) * 4, h);
      ctx.lineTo(x + h, 0);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawAnchor(ctx, x, y, color) {
    ctx.save();
    const g = ctx.createRadialGradient(x - 1.5, y - 1.5, .8, x, y, 4.8);
    g.addColorStop(0, '#fff');
    g.addColorStop(.45, color);
    g.addColorStop(1, 'rgba(20,20,20,.35)');
    ctx.fillStyle = g;
    ctx.strokeStyle = 'rgba(20,20,20,.42)';
    ctx.beginPath();
    ctx.arc(x, y, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  function projectedPanel(cx, cy, width, height, rx, ry, rz, w, h, notch = true) {
    const local = notch
      ? [
          { x: -width / 2, y: -height / 2, z: 0 },
          { x: width / 2, y: -height / 2, z: 0 },
          { x: width / 2, y: height * .24, z: 0 },
          { x: width * .16, y: height / 2, z: 0 },
          { x: 0, y: height * .36, z: 0 },
          { x: -width * .16, y: height / 2, z: 0 },
          { x: -width / 2, y: height * .24, z: 0 },
        ]
      : [
          { x: -width / 2, y: -height / 2, z: 0 },
          { x: width / 2, y: -height / 2, z: 0 },
          { x: width / 2, y: height / 2, z: 0 },
          { x: -width / 2, y: height / 2, z: 0 },
        ];
    return local.map((pt) => {
      const r = rotate3d(pt, rx, ry, rz);
      return project3d(cx + r.x, cy + r.y, r.z, w, h);
    });
  }

  function fillPanel(ctx, pts, candidate, shade = .5, phase = 0) {
    const minX = Math.min(...pts.map(p => p.x));
    const maxX = Math.max(...pts.map(p => p.x));
    const minY = Math.min(...pts.map(p => p.y));
    const maxY = Math.max(...pts.map(p => p.y));
    const g = ctx.createLinearGradient(minX, minY, maxX, maxY);
    g.addColorStop(0, 'rgba(255,255,255,.88)');
    g.addColorStop(.14, candidate.accent);
    g.addColorStop(.52, blendHex(candidate.accent, '#111111', .58));
    g.addColorStop(.86, candidate.accent);
    g.addColorStop(1, 'rgba(255,255,255,.58)');
    pathPoints(ctx, pts);
    ctx.fillStyle = g;
    ctx.shadowColor = 'rgba(20,20,20,.25)';
    ctx.shadowBlur = 13;
    ctx.shadowOffsetY = 7;
    ctx.fill();
    ctx.shadowBlur = 0;
    drawEnvironmentReflection(ctx, pts, phase, .34 + shade * .12);
    drawFresnelHighlight(ctx, pts, 'rgba(255,255,255,.7)', 1.2);
    ctx.save();
    pathPoints(ctx, pts);
    ctx.strokeStyle = 'rgba(20,20,20,.36)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  }

  function drawPanelText(ctx, text, cx, cy, angle, color = '#fff') {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    ctx.font = '900 9px JetBrains Mono, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = color;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  function ensureRope(state, w, h) {
    const key = `rope:${modelKey(w, h)}`;
    if (state.key === key && state.rope) return;
    state.key = key;
    state.rope = [];
    const count = 10;
    const startX = -40;
    const y = -h * .34;
    for (let i = 0; i < count; i++) {
      state.rope.push(particle(startX + i * 8.8, y + i * 4.6, Math.sin(i) * 3, i === 0));
    }
  }

  function stepVerletRope(ctx, candidate, state, t, w, h) {
    ensureRope(state, w, h);
    const pull = state.pointer.active ? state.pointer.pull : 0;
    const wind = Math.sin(t * 1.5 + state.seed) * .018 + state.pointer.vx * .004;
    state.rope.forEach((p, i) => {
      if (i === 0) {
        p.x = -38 + Math.sin(t * .7) * 2;
        p.y = -h * .34;
        p.z = 0;
        p.px = p.x;
        p.py = p.y;
        p.pz = p.z;
      } else {
        verletIntegrate(p, wind, .18 + pull * .06, Math.sin(t + i) * .014 + state.pointer.vy * .002);
      }
    });
    const tail = state.rope[state.rope.length - 1];
    if (state.pointer.active) {
      tail.x += state.pointer.dx * .025;
      tail.y += state.pointer.dy * .022;
      tail.z += Math.sin(t * 2) * .4;
    }
    for (let k = 0; k < 6; k++) {
      for (let i = 0; i < state.rope.length - 1; i++) solveDistance(state.rope[i], state.rope[i + 1], 10, .94);
    }
    const pts = state.rope.map(p => project3d(p.x, p.y, p.z, w, h));
    ctx.save();
    ctx.strokeStyle = 'rgba(54,28,20,.7)';
    ctx.lineWidth = 1.35;
    ctx.beginPath();
    pts.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
    ctx.stroke();
    ctx.restore();
    drawAnchor(ctx, pts[0].x, pts[0].y, candidate.accent);
    const angle = Math.atan2(tail.y - state.rope[state.rope.length - 2].y, tail.x - state.rope[state.rope.length - 2].x) - Math.PI / 2;
    const panel = projectedPanel(tail.x + 10, tail.y + 34, 44, 60, .55, Math.sin(t + state.seed) * .55, angle, w, h, true);
    fillPanel(ctx, panel, candidate, .48, t);
    drawPanelText(ctx, "Don't Die.", pts[pts.length - 1].x + 9, pts[pts.length - 1].y + 30, angle, '#fff8f0');
  }

  function ensureCloth(state, w, h) {
    const key = `cloth:${modelKey(w, h)}`;
    if (state.key === key && state.cloth) return;
    state.key = key;
    const cols = 6;
    const rows = 6;
    const gap = Math.min(w, h) * .09;
    state.cloth = { cols, rows, gap, points: [] };
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        state.cloth.points.push(particle((x - (cols - 1) / 2) * gap, -h * .28 + y * gap, Math.sin(x + y) * 3, y === 0 && (x === 0 || x === cols - 1 || x === 3)));
      }
    }
  }

  function stepPbdCloth(ctx, candidate, state, t, w, h) {
    ensureCloth(state, w, h);
    const { cols, rows, gap, points } = state.cloth;
    points.forEach((p, idx) => {
      const x = idx % cols;
      const y = Math.floor(idx / cols);
      if (p.pinned) {
        p.x += (x - (cols - 1) / 2) * gap - p.x;
        p.y += (-h * .29 + Math.sin(t * 1.3 + x) * 2) - p.y;
        p.z = Math.sin(t + x * .7) * 5;
        p.px = p.x; p.py = p.y; p.pz = p.z;
      } else {
        verletIntegrate(p, Math.sin(t + y) * .012 + state.pointer.vx * .0015, .09 + state.pointer.pull * .045, Math.sin(t * 1.8 + x * .8) * .025);
      }
    });
    if (state.pointer.active) {
      const mid = points[Math.floor(points.length * .68)];
      mid.x += state.pointer.dx * .018;
      mid.y += state.pointer.dy * .018;
      mid.z -= 10;
    }
    for (let k = 0; k < 4; k++) {
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const i = y * cols + x;
          if (x < cols - 1) solveDistance(points[i], points[i + 1], gap, .82);
          if (y < rows - 1) solveDistance(points[i], points[i + cols], gap, .82);
        }
      }
    }
    for (let y = 0; y < rows - 1; y++) {
      for (let x = 0; x < cols - 1; x++) {
        const quad = [points[y * cols + x], points[y * cols + x + 1], points[(y + 1) * cols + x + 1], points[(y + 1) * cols + x]].map(p => project3d(p.x, p.y, p.z, w, h));
        const shade = .24 + y / rows * .36 + Math.sin(t + x) * .04;
        ctx.save();
        pathPoints(ctx, quad);
        ctx.fillStyle = `rgba(15,118,110,${.36 + shade})`;
        ctx.fill();
        drawEnvironmentReflection(ctx, quad, t + x, .18);
        ctx.strokeStyle = 'rgba(255,255,255,.28)';
        ctx.lineWidth = .55;
        ctx.stroke();
        ctx.restore();
      }
    }
    const label = points[Math.floor(points.length * .58)];
    const lp = project3d(label.x, label.y, label.z - 8, w, h);
    drawPanelText(ctx, 'DD', lp.x, lp.y, Math.sin(t) * .12, '#f0fdfa');
  }

  function stepRigidHinge(ctx, candidate, state, t, w, h) {
    if (!state.rigid) state.rigid = { angle: -.25, vel: 0 };
    const target = state.pointer.active ? clamp(state.pointer.dx * .012, -.9, .9) : Math.sin(t * .7 + state.seed) * .16;
    state.rigid.vel += (target - state.rigid.angle) * .07 - Math.sin(state.rigid.angle) * .025;
    state.rigid.vel *= .91;
    state.rigid.angle += state.rigid.vel;
    const hinge = project3d(0, -h * .29, 0, w, h);
    drawAnchor(ctx, hinge.x, hinge.y, candidate.accent);
    const length = Math.min(h * .48, 66);
    const cx = Math.sin(state.rigid.angle) * length * .35;
    const cy = -h * .13 + Math.cos(state.rigid.angle) * length * .35;
    ctx.save();
    ctx.strokeStyle = 'rgba(70,42,12,.55)';
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(hinge.x, hinge.y);
    const hook = project3d(cx, cy - 30, 0, w, h);
    ctx.lineTo(hook.x, hook.y);
    ctx.stroke();
    ctx.restore();
    const panel = projectedPanel(cx, cy, 48, 66, .65, Math.sin(t * .9) * .42, state.rigid.angle, w, h, false);
    fillPanel(ctx, panel, candidate, .45, t);
    drawPanelText(ctx, 'HINGE', w * .5 + cx, h * .5 + cy, state.rigid.angle, '#fff7ed');
  }

  function ensureSoftBody(state, w, h) {
    const key = `soft:${modelKey(w, h)}`;
    if (state.key === key && state.body) return;
    state.key = key;
    const count = 16;
    const radius = Math.min(w, h) * .19;
    state.body = { radius, points: [] };
    for (let i = 0; i < count; i++) {
      const a = Math.PI * 2 * i / count;
      state.body.points.push(particle(Math.cos(a) * radius, Math.sin(a) * radius - 5, Math.sin(a * 2) * 5));
    }
  }

  function stepSoftBody(ctx, candidate, state, t, w, h) {
    ensureSoftBody(state, w, h);
    const { points, radius } = state.body;
    points.forEach((p, i) => {
      const a = Math.PI * 2 * i / points.length;
      const targetX = Math.cos(a) * radius * (1 + Math.sin(t * 1.6 + i) * .03);
      const targetY = Math.sin(a) * radius * .82 - 4 + Math.cos(t + i) * 1.6;
      p.x += (targetX - p.x) * .055 + state.pointer.dx * .002;
      p.y += (targetY - p.y) * .055 + state.pointer.pull * .8;
      p.z += (Math.sin(t * 2 + i) * 9 - p.z) * .07;
    });
    for (let k = 0; k < 4; k++) {
      points.forEach((p, i) => solveDistance(p, points[(i + 1) % points.length], radius * .39, .28));
    }
    const pts = points.map(p => project3d(p.x, p.y, p.z, w, h));
    ctx.save();
    pathPoints(ctx, pts);
    const g = ctx.createRadialGradient(w * .43, h * .38, 5, w * .5, h * .5, Math.min(w, h) * .34);
    g.addColorStop(0, 'rgba(255,255,255,.9)');
    g.addColorStop(.26, 'rgba(244,114,182,.78)');
    g.addColorStop(.72, candidate.accent);
    g.addColorStop(1, 'rgba(76,5,25,.88)');
    ctx.fillStyle = g;
    ctx.shadowColor = 'rgba(20,20,20,.24)';
    ctx.shadowBlur = 16;
    ctx.shadowOffsetY = 8;
    ctx.fill();
    ctx.shadowBlur = 0;
    drawEnvironmentReflection(ctx, pts, t, .36);
    drawFresnelHighlight(ctx, pts, 'rgba(255,255,255,.74)', 1.2);
    ctx.restore();
    drawPanelText(ctx, 'SOFT', w * .5, h * .52, Math.sin(t) * .08, '#fff1f2');
  }

  function stepNewtonCradle(ctx, candidate, state, t, w, h) {
    if (!state.cradle) state.cradle = { left: .45, right: 0, vLeft: 0, vRight: 0, hit: 0 };
    const c = state.cradle;
    const pull = state.pointer.active ? clamp(-state.pointer.dx * .006, -.55, .55) : 0;
    c.vLeft += (-Math.sin(c.left) * .045) + pull * .02;
    c.vRight += (-Math.sin(c.right) * .045) - pull * .012;
    c.vLeft *= .985; c.vRight *= .985;
    c.left += c.vLeft; c.right += c.vRight;
    if (Math.abs(c.left) < .045 && c.vLeft < -.018) {
      c.vRight = -c.vLeft * .92;
      c.vLeft *= -.12;
      c.hit = 1;
    }
    c.hit *= .9;
    const topY = h * .2;
    const baseX = w * .5;
    const spacing = Math.min(w * .12, 18);
    const len = Math.min(h * .34, 48);
    for (let i = 0; i < 5; i++) {
      const angle = i === 0 ? c.left : i === 4 ? c.right : Math.sin(t * 3 + i) * .006 * c.hit;
      const ax = baseX + (i - 2) * spacing;
      const bx = ax + Math.sin(angle) * len;
      const by = topY + Math.cos(angle) * len;
      ctx.save();
      ctx.strokeStyle = 'rgba(20,20,20,.34)';
      ctx.lineWidth = .8;
      ctx.beginPath();
      ctx.moveTo(ax, topY);
      ctx.lineTo(bx, by);
      ctx.stroke();
      drawAnchor(ctx, ax, topY, candidate.accent);
      const g = ctx.createRadialGradient(bx - 4, by - 5, 1, bx, by, 11);
      g.addColorStop(0, '#fff');
      g.addColorStop(.23, '#cbd5e1');
      g.addColorStop(.56, '#64748b');
      g.addColorStop(1, '#111827');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(bx, by, 8.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,.65)';
      ctx.stroke();
      ctx.restore();
    }
    drawPanelText(ctx, 'IMPACT', w * .5, h * .78, 0, 'rgba(20,20,20,.68)');
  }

  function ensureFluid(state, w, h) {
    const key = `fluid:${modelKey(w, h)}`;
    if (state.key === key && state.fluid) return;
    state.key = key;
    state.fluid = [];
    for (let i = 0; i < 44; i++) {
      const a = i * 2.399;
      const r = Math.sqrt(i / 44) * Math.min(w, h) * .26;
      state.fluid.push({ x: Math.cos(a) * r, y: Math.sin(a) * r, z: Math.sin(a * 2) * 9, vx: 0, vy: 0 });
    }
  }

  function stepFluidSplat(ctx, candidate, state, t, w, h) {
    ensureFluid(state, w, h);
    const pts = [];
    state.fluid.forEach((p, i) => {
      const dx = p.x;
      const dy = p.y;
      const swirl = .0028 + Math.sin(t + i) * .0008 + state.pointer.pull * .0009;
      p.vx += -dy * swirl + state.pointer.vx * .0008;
      p.vy += dx * swirl + state.pointer.vy * .0008;
      p.vx *= .975; p.vy *= .975;
      p.x += p.vx;
      p.y += p.vy;
      p.z = Math.sin(t * 2 + i * .3) * 18;
      const rad = Math.min(w, h) * .29;
      const mag = Math.hypot(p.x, p.y) || 1;
      if (mag > rad) { p.x *= rad / mag; p.y *= rad / mag; p.vx *= -.35; p.vy *= -.35; }
      pts.push(project3d(p.x, p.y, p.z, w, h));
    });
    ctx.save();
    pts.forEach((p, i) => {
      const g = ctx.createRadialGradient(p.x - 2, p.y - 2, 1, p.x, p.y, 12);
      g.addColorStop(0, 'rgba(255,255,255,.78)');
      g.addColorStop(.3, 'rgba(56,189,248,.58)');
      g.addColorStop(1, 'rgba(3,105,161,.04)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 7 + Math.sin(t + i) * 1.6, 0, Math.PI * 2);
      ctx.fill();
    });
    const lens = projectedPanel(0, 3, Math.min(w, h) * .52, Math.min(w, h) * .34, .9, Math.sin(t) * .35, Math.sin(t * .6) * .22, w, h, false);
    drawEnvironmentReflection(ctx, lens, t, .42);
    drawFresnelHighlight(ctx, lens, 'rgba(255,255,255,.68)', 1.4);
    ctx.restore();
    drawPanelText(ctx, 'FLOW', w * .5, h * .5, Math.sin(t) * .08, '#e0f2fe');
  }

  function stepMagneticField(ctx, candidate, state, t, w, h) {
    if (!state.magnet) state.magnet = { x: 0, y: 5, vx: 0, vy: 0 };
    const poles = [
      { x: -w * .22, y: -h * .08, sign: 1 },
      { x: w * .22, y: h * .1, sign: -1 },
    ];
    let fx = 0, fy = 0;
    poles.forEach((pole) => {
      const dx = pole.x - state.magnet.x;
      const dy = pole.y - state.magnet.y;
      const d2 = Math.max(220, dx * dx + dy * dy);
      fx += dx / d2 * pole.sign * 19;
      fy += dy / d2 * pole.sign * 19;
    });
    fx += state.pointer.dx * .002;
    fy += state.pointer.dy * .002;
    state.magnet.vx = (state.magnet.vx + fx) * .93;
    state.magnet.vy = (state.magnet.vy + fy) * .93;
    state.magnet.x = clamp(state.magnet.x + state.magnet.vx, -w * .28, w * .28);
    state.magnet.y = clamp(state.magnet.y + state.magnet.vy, -h * .22, h * .28);
    ctx.save();
    for (let i = 0; i < 9; i++) {
      ctx.strokeStyle = `rgba(124,45,18,${.15 + i * .025})`;
      ctx.lineWidth = .7;
      ctx.beginPath();
      const off = (i - 4) * 7;
      ctx.moveTo(w * .5 - w * .27, h * .5 - h * .08 + off);
      ctx.bezierCurveTo(w * .5 - 12, h * .5 - 54 + off * .3, w * .5 + 12, h * .5 + 54 + off * .3, w * .5 + w * .27, h * .5 + h * .1 - off);
      ctx.stroke();
    }
    poles.forEach((pole) => {
      const p = project3d(pole.x, pole.y, 0, w, h);
      drawAnchor(ctx, p.x, p.y, pole.sign > 0 ? '#dc2626' : '#2563eb');
    });
    ctx.restore();
    const panel = projectedPanel(state.magnet.x, state.magnet.y, 52, 40, .45, Math.sin(t * 1.4) * .55, Math.atan2(state.magnet.vy, state.magnet.vx) * .3, w, h, false);
    fillPanel(ctx, panel, candidate, .52, t);
    drawPanelText(ctx, 'FIELD', w * .5 + state.magnet.x, h * .5 + state.magnet.y, 0, '#fff7ed');
  }

  function stepTorsionStrip(ctx, candidate, state, t, w, h) {
    const segments = 13;
    const width = Math.min(w, h) * .26;
    const height = Math.min(h * .62, 82);
    const rows = [];
    const twistPull = state.pointer.active ? state.pointer.dx * .018 : 0;
    for (let i = 0; i < segments; i++) {
      const v = i / (segments - 1);
      const y = -height / 2 + v * height;
      const twist = Math.sin(t * 1.4 + v * 4 + state.seed) * .75 + twistPull * (v - .5);
      const left = rotate3d({ x: -width / 2, y, z: 0 }, .5, twist, Math.sin(t) * .08);
      const right = rotate3d({ x: width / 2, y, z: 0 }, .5, twist, Math.sin(t) * .08);
      rows.push([project3d(left.x, left.y, left.z, w, h), project3d(right.x, right.y, right.z, w, h)]);
    }
    for (let i = 0; i < rows.length - 1; i++) {
      const quad = [rows[i][0], rows[i][1], rows[i + 1][1], rows[i + 1][0]];
      ctx.save();
      pathPoints(ctx, quad);
      ctx.fillStyle = i % 2 ? 'rgba(76,29,149,.78)' : 'rgba(167,139,250,.62)';
      ctx.fill();
      drawEnvironmentReflection(ctx, quad, t + i, .22);
      drawFresnelHighlight(ctx, quad, 'rgba(255,255,255,.42)', .65);
      ctx.restore();
    }
    drawPanelText(ctx, 'TWIST', w * .5, h * .5, Math.sin(t) * .16, '#f5f3ff');
  }

  function stepGyroPrecession(ctx, candidate, state, t, w, h) {
    if (!state.gyro) state.gyro = { yaw: 0, spin: 0, tilt: .8 };
    state.gyro.spin += .22 + Math.abs(state.pointer.vx) * .006;
    state.gyro.yaw += .025 + state.pointer.dx * .0009;
    state.gyro.tilt += (state.pointer.active ? clamp(state.pointer.dy * .004, -.35, .35) : Math.sin(t * .8) * .02) - state.gyro.tilt * .018;
    const axisA = project3d(Math.cos(state.gyro.yaw) * -42, Math.sin(state.gyro.tilt) * -18, -20, w, h);
    const axisB = project3d(Math.cos(state.gyro.yaw) * 42, Math.sin(state.gyro.tilt) * 18, 20, w, h);
    ctx.save();
    ctx.strokeStyle = 'rgba(20,20,20,.5)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(axisA.x, axisA.y);
    ctx.lineTo(axisB.x, axisB.y);
    ctx.stroke();
    const disc = [];
    const rx = 43;
    const ry = 15;
    for (let i = 0; i < 28; i++) {
      const a = Math.PI * 2 * i / 28 + state.gyro.spin;
      const p = rotate3d({ x: Math.cos(a) * rx, y: Math.sin(a) * ry, z: 0 }, state.gyro.tilt, state.gyro.yaw, .1);
      disc.push(project3d(p.x, p.y, p.z, w, h));
    }
    pathPoints(ctx, disc);
    const g = ctx.createRadialGradient(w * .45, h * .42, 2, w * .5, h * .5, 50);
    g.addColorStop(0, '#fff');
    g.addColorStop(.26, '#67e8f9');
    g.addColorStop(.7, candidate.accent);
    g.addColorStop(1, '#083344');
    ctx.fillStyle = g;
    ctx.shadowColor = 'rgba(20,20,20,.22)';
    ctx.shadowBlur = 14;
    ctx.shadowOffsetY = 7;
    ctx.fill();
    ctx.shadowBlur = 0;
    drawEnvironmentReflection(ctx, disc, t, .36);
    drawFresnelHighlight(ctx, disc, 'rgba(255,255,255,.78)', 1.1);
    ctx.restore();
    drawPanelText(ctx, 'GYRO', w * .5, h * .5, Math.sin(state.gyro.yaw) * .2, '#ecfeff');
  }

  function stepSuspensionBounce(ctx, candidate, state, t, w, h) {
    if (!state.suspension) state.suspension = { y: 0, vy: 0, pitch: 0, vp: 0 };
    const s = state.suspension;
    const target = state.pointer.active ? clamp(state.pointer.dy * .22, -18, 26) : Math.sin(t * 2 + state.seed) * 4;
    s.vy += (target - s.y) * .075 - s.vy * .04;
    s.vy *= .88;
    s.y += s.vy;
    const pitchTarget = state.pointer.dx * .004 + Math.sin(t * 1.6) * .08;
    s.vp += (pitchTarget - s.pitch) * .075;
    s.vp *= .86;
    s.pitch += s.vp;
    const baseY = h * .5 + s.y;
    const leftTop = { x: w * .35, y: baseY - 22 };
    const rightTop = { x: w * .65, y: baseY - 22 };
    const leftBottom = { x: w * .33, y: h * .73 };
    const rightBottom = { x: w * .67, y: h * .73 };
    ctx.save();
    ctx.strokeStyle = 'rgba(20,20,20,.38)';
    ctx.lineWidth = 2;
    [[leftTop, leftBottom], [rightTop, rightBottom]].forEach(([a, b], i) => {
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      for (let k = 0; k < 6; k++) {
        const v = k / 5;
        const x = a.x + (b.x - a.x) * v + Math.sin(k * Math.PI) * 5;
        const y = a.y + (b.y - a.y) * v;
        ctx.lineTo(x + (k % 2 ? 4 : -4), y);
      }
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
      drawAnchor(ctx, b.x, b.y, i ? '#166534' : '#84cc16');
    });
    const panel = projectedPanel(0, s.y - 12, 78, 36, .64, s.pitch, s.pitch * .35, w, h, false);
    fillPanel(ctx, panel, candidate, .48, t);
    ctx.restore();
    drawPanelText(ctx, 'SPRING', w * .5, baseY - 14, s.pitch, '#f0fdf4');
  }

  function drawPhysicsCandidate(ctx, candidate, state, t, w, h) {
    drawLabBackground(ctx, candidate, t, w, h);
    if (candidate.id === 'verlet-rope') stepVerletRope(ctx, candidate, state, t, w, h);
    else if (candidate.id === 'pbd-cloth') stepPbdCloth(ctx, candidate, state, t, w, h);
    else if (candidate.id === 'rigid-hinge') stepRigidHinge(ctx, candidate, state, t, w, h);
    else if (candidate.id === 'soft-body') stepSoftBody(ctx, candidate, state, t, w, h);
    else if (candidate.id === 'newton-cradle') stepNewtonCradle(ctx, candidate, state, t, w, h);
    else if (candidate.id === 'fluid-splat') stepFluidSplat(ctx, candidate, state, t, w, h);
    else if (candidate.id === 'magnetic-field') stepMagneticField(ctx, candidate, state, t, w, h);
    else if (candidate.id === 'torsion-strip') stepTorsionStrip(ctx, candidate, state, t, w, h);
    else if (candidate.id === 'gyro-precession') stepGyroPrecession(ctx, candidate, state, t, w, h);
    else stepSuspensionBounce(ctx, candidate, state, t, w, h);
    drawReferenceBadge(ctx, candidate, w, h);
  }

  function initPhysicsCandidateLab({ card, candidate, setOpen, toggleOpen, reduced }) {
    const canvas = card.querySelector('canvas');
    const state = {
      seed: PHYSICS_CANDIDATES.findIndex((c) => c.id === candidate.id) * .71,
      pointer: { active: false, x: 0, y: 0, dx: 0, dy: 0, vx: 0, vy: 0, pull: 0 },
      dragDistance: 0,
      startX: 0,
      startY: 0,
      lastX: 0,
      lastY: 0,
      marked: false,
    };
    function localPoint(e) {
      const rect = canvas.getBoundingClientRect();
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }
    function togglePrimed(next) {
      card.classList.toggle('primed', next);
      card.dataset.engineStatus = next ? 'drawing' : 'ready';
    }
    canvas.addEventListener('pointerdown', (e) => {
      const pt = localPoint(e);
      state.pointer.active = true;
      state.pointer.x = pt.x;
      state.pointer.y = pt.y;
      state.pointer.dx = 0;
      state.pointer.dy = 0;
      state.pointer.vx = 0;
      state.pointer.vy = 0;
      state.pointer.pull = 0;
      state.startX = e.clientX;
      state.startY = e.clientY;
      state.lastX = e.clientX;
      state.lastY = e.clientY;
      state.dragDistance = 0;
      canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener('pointermove', (e) => {
      if (!state.pointer.active) return;
      const pt = localPoint(e);
      const dx = e.clientX - state.startX;
      const dy = e.clientY - state.startY;
      state.dragDistance = Math.max(state.dragDistance, Math.hypot(dx, dy));
      state.pointer.x = pt.x;
      state.pointer.y = pt.y;
      state.pointer.dx = dx;
      state.pointer.dy = dy;
      state.pointer.vx = e.clientX - state.lastX;
      state.pointer.vy = e.clientY - state.lastY;
      state.pointer.pull = clamp(dy / 76, -1, 1.4);
      state.lastX = e.clientX;
      state.lastY = e.clientY;
      togglePrimed(Math.abs(dx) > 30 || dy > 34);
    });
    function release(e) {
      if (!state.pointer.active) return;
      state.pointer.active = false;
      if (canvas.hasPointerCapture(e.pointerId)) canvas.releasePointerCapture(e.pointerId);
      const dx = e.clientX - state.startX;
      const dy = e.clientY - state.startY;
      state.pointer.dx = dx * .2;
      state.pointer.dy = dy * .2;
      state.pointer.pull = 0;
      togglePrimed(false);
      if (Math.abs(dx) > 30 || dy > 34) toggleOpen();
    }
    canvas.addEventListener('pointerup', release);
    canvas.addEventListener('pointercancel', release);
    card.addEventListener('click', () => {
      if (state.dragDistance > 6) return;
      toggleOpen();
    });
    card.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        toggleOpen();
      }
    });
    card.dataset.engineStatus = 'ready';
    return {
      update(ms) {
        const { ctx, w, h } = resizeCanvas(canvas);
        const time = reduced ? state.seed : ms / 1000;
        state.pointer.dx *= .88;
        state.pointer.dy *= .88;
        state.pointer.vx *= .86;
        state.pointer.vy *= .86;
        drawPhysicsCandidate(ctx, candidate, state, time, w, h);
        if (!state.marked) {
          try { card.dataset.preview = canvas.toDataURL('image/png').slice(0, 24); }
          catch { card.dataset.preview = 'blocked'; }
          state.marked = true;
        }
      },
    };
  }

  function renderDailyRibbon(summary) {
    const stage = $('daily-summary-stage');
    if (!stage || !summary || !summary.body) return;
    const title = summary.title || "오늘의 AI 업데이트";
    stage.hidden = false;
    stage.innerHTML = `
      <div class="summary-physics" id="summary-physics">
        <section class="physics-lab-panel" aria-label="Don't Die physics candidate bench">
          <div class="physics-lab-head">
            <div class="physics-lab-kicker">Don't Die. Physics Bench</div>
            <div class="physics-lab-note">Pull sideways/down · tap to open</div>
          </div>
          <div class="physics-lab-grid">
            ${PHYSICS_CANDIDATES.map((candidate) => `
              <div class="physics-engine-card engine-card-${candidate.id}" role="button" tabindex="0" data-physics-engine="${candidate.id}" data-engine-status="drawing" aria-label="${esc(candidate.label)} Don't Die. 요약 열기">
                <div class="engine-viewport"><canvas class="engine-canvas" aria-hidden="true"></canvas></div>
                <div class="engine-caption"><span class="engine-name">${esc(candidate.label)}</span><span class="engine-hint">${esc(candidate.hint)}</span></div>
              </div>
            `).join('')}
          </div>
        </section>
        <article class="summary-sheet" id="summary-sheet" aria-hidden="true">
          <div class="summary-sheet-head">
            <div>
              <div class="summary-sheet-kicker">Don't Die. · ${esc(summary.date || '')}</div>
              <h2 class="summary-sheet-title">${formatInlineText(title)}</h2>
            </div>
            <button class="summary-close" id="summary-close" type="button">접기</button>
          </div>
          <div class="summary-copy">
            ${paragraphs(summary.body).map(p => `<p>${formatInlineText(p)}</p>`).join('')}
          </div>
        </article>
      </div>
    `;

    const physics = $('summary-physics');
    const sheet = $('summary-sheet');
    const close = $('summary-close');
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    let openState = false;
    const engineLabs = [];
    function setOpen(next) {
      openState = next;
      physics.classList.toggle('open', next);
      physics.classList.remove('primed');
      sheet.setAttribute('aria-hidden', String(!next));
    }
    function toggleOpen() { setOpen(!openState); }
    physics.querySelectorAll('[data-physics-engine]').forEach((card) => {
      const candidate = PHYSICS_CANDIDATES.find((item) => item.id === card.dataset.physicsEngine);
      if (candidate) engineLabs.push(initPhysicsCandidateLab({ card, candidate, setOpen, toggleOpen, reduced }));
    });
    function tick(ms) {
      engineLabs.forEach((lab) => lab && lab.update && lab.update(ms));
      requestAnimationFrame(tick);
    }
    function closeSummarySheet(e) {
      e.preventDefault();
      e.stopPropagation();
      setOpen(false);
    }
    close.addEventListener('pointerdown', closeSummarySheet);
    close.addEventListener('click', closeSummarySheet);
    requestAnimationFrame(tick);
  }

  let data;
  const inlineEl = document.getElementById('articles-data');
  const inlineRaw = inlineEl ? inlineEl.textContent.trim() : '';
  if (inlineRaw && !inlineRaw.startsWith('__')) {
    try { data = JSON.parse(inlineRaw); }
    catch (e) {
      $('center').innerHTML = `<div class="error">인라인 파싱 실패 · ${esc(e.message)}</div>`; return;
    }
  } else {
    try {
      const res = await fetch('articles.json?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      data = await res.json();
    } catch (e) {
      $('center').innerHTML = `<div class="error">기사를 불러오지 못했습니다 · ${esc(e.message)}</div>`; return;
    }
  }

  const all = data.articles || [];
  const gen = data.generated_at;
  $('topbar-date').textContent = fmtTime(gen);
  $('masthead-date').textContent = fmtDate(gen, { weekday: true });
  $('masthead-source').textContent = `${all.length} STORIES · UPDATED ${fmtTime(gen)}`;
  $('footer-meta').textContent = `GENERATED ${fmtTime(gen)}`;
  renderDailyRibbon(data.daily_summary);

  if (!all.length) {
    $('center').innerHTML = `<div class="empty">표시할 기사가 없습니다.</div>`;
    return;
  }

  const byPlacement = (p) => all.filter(a => a.placement === p)
    .sort((a,b) => (b.placed_at || '').localeCompare(a.placed_at || ''));
  const top = byPlacement('top');
  const main = byPlacement('main');
  const side = byPlacement('side');

  // Tag badge renderer
  function tagBadges(a) {
    const cat = a.category || '';
    const trust = a.trust || '';
    let out = '';
    if (cat === 'rumor') out += '<span class="tag rumor">찌라시</span>';
    if (trust === 'low') out += '<span class="tag trust-low">낮은 신뢰</span>';
    return out;
  }

  // ── Center render ──
  let html = '';
  if (top[0]) {
    const t = top[0];
    html += `
      <div class="section-label"><span>TOP STORY</span></div>
      <article class="hero" data-id="${esc(t.id)}">
        <div class="kicker">LEAD ${tagBadges(t)}</div>
        <h2>${formatInlineText(t.headline)}</h2>
        <p class="lede">${formatInlineText(excerpt(t.body, 240))}</p>
        <div class="read-more">Read the full story</div>
      </article>
    `;
  }
  if (main.length) {
    html += `<div class="section-label"><span>MAIN · ${main.length}/6</span></div><div class="grid">`;
    main.forEach((a, i) => {
      html += `
        <article class="card" data-id="${esc(a.id)}">
          <div class="num">No. ${String(i + 1).padStart(2, '0')} ${tagBadges(a)}</div>
          <h3>${formatInlineText(a.headline)}</h3>
          <p>${formatInlineText(excerpt(a.body, 180))}</p>
        </article>
      `;
    });
    html += `</div>`;
  }
  if (!top.length && !main.length) {
    html += `<div class="empty">메인 기사 없음. 사이드 또는 더보기를 확인하세요.</div>`;
  }
  $('center').innerHTML = html;

  // ── Sides render (split 3-way: left, center-extra, right) ──
  function sideCard(a, n, withSnip) {
    const snip = withSnip ? `<div class="snip">${formatInlineText(excerpt(a.body, 120))}</div>` : '';
    return `
      <div class="side-item" data-id="${esc(a.id)}">
        <div class="num">No. ${String(n).padStart(2, '0')} ${tagBadges(a)}</div>
        <div class="t">${formatInlineText(a.headline)}</div>
        ${snip}
      </div>
    `;
  }
  // 3-way split: i%3 — 0→left, 1→center-extra, 2→right
  const leftItems = side.filter((_, i) => i % 3 === 0);
  const centerExtraItems = side.filter((_, i) => i % 3 === 1);
  const rightItems = side.filter((_, i) => i % 3 === 2);

  $('side-left').innerHTML = leftItems
    .map((a, i) => sideCard(a, i * 3 + 1, true)).join('');
  $('side-right').innerHTML = rightItems
    .map((a, i) => sideCard(a, i * 3 + 3, true)).join('');

  // Center extra: append to main content as a second grid of side items
  if (centerExtraItems.length) {
    const extraHtml = `
      <div class="section-label"><span>MORE</span></div>
      <div class="more-list">
        ${centerExtraItems.map((a, i) => sideCard(a, i * 3 + 2, true)).join('')}
      </div>
    `;
    $('center').insertAdjacentHTML('beforeend', extraHtml);
  }

  // ── Reader modal ──
  const byId = Object.fromEntries(all.map(a => [a.id, a]));
  const reader = $('reader');
  function openReader(id) {
    const a = byId[id];
    if (!a) return;
    $('reader-title').innerHTML = formatInlineText(a.headline);
    $('reader-byline').textContent = `FIRST LIGHT AI · ${fmtDate(a.placed_at || gen)}`;
    $('reader-body').innerHTML = paragraphs(a.body).map(p => `<p>${formatInlineText(p)}</p>`).join('');
    reader.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeReader() {
    reader.classList.remove('open');
    document.body.style.overflow = '';
  }
  $('reader-close').addEventListener('click', closeReader);
  reader.addEventListener('click', (e) => { if (e.target === reader) closeReader(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeReader(); });
  document.querySelectorAll('[data-id]').forEach(el => {
    el.addEventListener('click', () => openReader(el.dataset.id));
  });
})();
</script>
</body>
</html>
