<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="AI 커뮤니티의 첫 빛을 추적합니다."/>
<title>First Light AI — 데일리 브리핑</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --paper: #faf8f3;
    --paper-alt: #f3f0e7;
    --ink: #141414;
    --ink-2: #2b2b2b;
    --ink-3: #5a5a5a;
    --ink-4: #8a8a8a;
    --rule: #1a1a1a;
    --rule-soft: #d9d5c7;
    --accent: #b91c1c;
    --accent-soft: #fef2f2;
    --serif: 'Noto Serif KR', 'Times New Roman', serif;
    --sans: 'Noto Sans KR', -apple-system, 'Segoe UI', sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; overflow-x: hidden; }
  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ── Topbar ── */
  .topbar {
    border-bottom: 1px solid var(--rule-soft);
    background: var(--paper);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--ink-3);
  }
  .topbar-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 24px;
    max-width: 1320px;
    margin: 0 auto;
    text-transform: uppercase;
  }
  .topbar .pulse {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); margin-right: 6px; vertical-align: middle;
    animation: pulse 2s infinite;
  }
  .topbar-right {
    display: inline-flex; align-items: center; gap: 14px;
  }
  .topbar-link {
    color: var(--accent); text-decoration: none;
    font-weight: 600; letter-spacing: 0.12em;
    padding: 3px 8px; border: 1px solid var(--accent);
    border-radius: 2px;
    transition: all .15s;
  }
  .topbar-link:hover {
    background: var(--accent); color: var(--paper);
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Masthead ── */
  .masthead {
    position: relative;
    overflow: visible;
    text-align: center;
    padding: 48px 24px 28px;
    border-bottom: 3px double var(--rule);
    max-width: 1320px;
    margin: 0 auto;
  }
	  .masthead h1 {
	    font-family: var(--serif);
	    font-weight: 900;
	    font-size: 5rem;
	    letter-spacing: -0.02em;
	    line-height: 0.9;
	    color: var(--ink);
	  }
	  @media (max-width: 720px) {
	    .masthead h1 { font-size: 2.6rem; }
	  }
  .masthead .tagline {
    font-family: var(--serif);
    font-style: italic;
    font-size: 1.05rem;
    color: var(--ink-3);
    margin-top: 14px;
    font-weight: 400;
  }
  .masthead .meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-4);
    margin-top: 18px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .masthead .meta .dot { margin: 0 10px; opacity: 0.5; }

  /* ── Layout: sides + center ── */
  .layout {
    max-width: 1560px;
    margin: 0 auto;
    padding: 32px 24px 0;
    display: grid;
    grid-template-columns: 300px minmax(0, 820px) 300px;
    gap: 44px;
    justify-content: center;
    align-items: start;
  }
  @media (max-width: 1280px) {
    .layout {
      display: flex;
      flex-direction: column;
      grid-template-columns: 1fr;
      padding: 32px 18px 0;
      gap: 0;
    }
    .center { order: 1; }
    .side-left { order: 2; margin-top: 40px; }
    .side-right { order: 3; margin-top: 0; }
  }

  /* ── Side columns (larger, no labels) ── */
  .side { }
  @media (max-width: 1280px) {
    .side { position: static; }
  }
  .side-item {
    padding: 18px 0;
    border-bottom: 1px solid var(--rule-soft);
    cursor: pointer;
    transition: opacity .15s;
  }
  .side-item:first-child { padding-top: 4px; }
  .side-item:hover { opacity: 0.65; }
  .side-item:last-child { border-bottom: none; }
  .side-item .num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-4);
    letter-spacing: 0.12em;
    margin-bottom: 6px;
  }
  .side-item .t {
    font-family: var(--serif);
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.35;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .side-item .snip {
    font-size: 0.82rem;
    line-height: 1.55;
    color: var(--ink-3);
    margin-top: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Section heading (center) ── */
  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 40px 0 24px;
  }
  .section-label:first-child { margin-top: 0; }
  .section-label::before, .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--rule-soft);
  }

  /* ── Tag badges ── */
  .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 2px;
    margin-right: 4px;
    vertical-align: middle;
  }
  .tag.rumor { background: #f97316; color: white; }
  .tag.news { display: none; }  /* news는 기본이라 표시 안 함 */
  .tag.trust-low { background: transparent; color: var(--ink-4); border: 1px solid var(--rule-soft); }
  .tag.trust-high { display: none; }  /* high는 기본 표시 안 함 */

  /* ── Hero (TOP) ── */
  .hero {
    padding: 4px 0 40px;
    cursor: pointer;
    transition: opacity .2s;
  }
  .hero:hover { opacity: 0.88; }
  .hero .kicker {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .hero h2 {
    font-family: var(--serif);
    font-size: clamp(1.8rem, 4.5vw, 2.8rem);
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 18px;
  }
  .hero .lede {
    font-family: var(--serif);
    font-size: 1.12rem;
    line-height: 1.7;
    color: var(--ink-2);
  }
  .hero .read-more {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 22px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .hero .read-more::after { content: '→'; transition: transform .2s; }
  .hero:hover .read-more::after { transform: translateX(4px); }

  /* ── Daily physics comparison lab ── */
  .daily-ribbon-stage {
    position: absolute;
    top: 128px;
    left: max(18px, calc(50% - 460px));
    width: min(920px, calc(100vw - 36px));
    height: 276px;
    margin: 0;
    padding: 0;
    z-index: 60;
    pointer-events: none;
  }
  .daily-ribbon-stage[hidden] { display: none; }
  .summary-physics {
    position: relative;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .summary-physics.open {}
  .physics-lab-panel {
    pointer-events: auto;
    text-align: left;
    background:
      linear-gradient(180deg, rgba(250,248,243,.96), rgba(243,240,231,.94)),
      repeating-linear-gradient(90deg, rgba(20,20,20,.035) 0 1px, transparent 1px 18px);
    border: 1px solid var(--rule);
    border-radius: 6px;
    box-shadow: 0 28px 70px rgba(20,20,20,.16), inset 0 1px 0 rgba(255,255,255,.75);
    padding: 14px;
  }
  .physics-lab-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 16px;
    padding: 0 2px 12px;
    border-bottom: 1px solid var(--rule-soft);
    margin-bottom: 12px;
  }
  .physics-lab-kicker {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 800;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .physics-lab-note {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: .1em;
    color: var(--ink-4);
    text-transform: uppercase;
  }
  .physics-lab-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
  }
  .physics-engine-card {
    position: relative;
    min-height: 174px;
    border: 1px solid var(--rule-soft);
    border-radius: 6px;
    background: color-mix(in srgb, var(--paper) 94%, white);
    color: var(--ink);
    overflow: hidden;
    cursor: grab;
    touch-action: none;
    user-select: none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.68), 0 12px 24px rgba(20,20,20,.08);
  }
  .physics-engine-card:active { cursor: grabbing; }
  .physics-engine-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 18% 12%, rgba(255,255,255,.64), transparent 30%),
      linear-gradient(145deg, rgba(185,28,28,.08), transparent 42%, rgba(20,20,20,.08));
    pointer-events: none;
    z-index: 1;
  }
  .physics-engine-card[data-engine-status="ready"] {
    border-color: color-mix(in srgb, var(--accent) 54%, var(--rule-soft));
  }
  .engine-viewport {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .engine-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  .engine-caption {
    position: absolute;
    left: 10px;
    right: 10px;
    bottom: 9px;
    z-index: 4;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 10px;
    pointer-events: none;
  }
  .engine-name {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 900;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .engine-hint {
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ink-4);
    text-align: right;
  }
  .summary-ribbon-pull {
    --ribbon-x: 0px;
    --ribbon-y: 26px;
    --ribbon-tilt: 0deg;
    --ribbon-fold-x: 0deg;
    --ribbon-fold-y: 0deg;
    position: absolute;
    left: 50%;
    top: 18px;
    width: 52px;
    min-height: 118px;
    padding: 0;
    border: 1px solid var(--rule);
    border-radius: 6px;
    background:
      linear-gradient(115deg, rgba(255,255,255,.58) 0 14%, transparent 14% 34%, rgba(20,20,20,.08) 34% 38%, transparent 38% 64%, rgba(255,255,255,.36) 64% 76%, rgba(20,20,20,.07) 76% 82%, transparent 82%),
      linear-gradient(180deg, rgba(185,28,28,.14), transparent 20%, rgba(20,20,20,.05) 50%, transparent 82%, rgba(185,28,28,.18)),
      repeating-linear-gradient(180deg, rgba(20,20,20,.035) 0 1px, transparent 1px 7px),
      var(--paper);
    color: var(--ink);
    box-shadow: 0 18px 34px rgba(20,20,20,.12), inset 0 1px 0 rgba(255,255,255,.75);
    cursor: grab;
    touch-action: none;
    user-select: none;
    pointer-events: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    transform-style: preserve-3d;
    transform: perspective(760px) translate(calc(-50% + var(--ribbon-x)), var(--ribbon-y)) rotate(var(--ribbon-tilt)) rotateX(var(--ribbon-fold-x)) rotateY(var(--ribbon-fold-y));
    transform-origin: 50% -40px;
    z-index: 62;
  }
  .summary-ribbon-pull:active { cursor: grabbing; }
  .summary-ribbon-pull::before,
  .summary-ribbon-pull::after {
    content: '';
    position: absolute;
  }
  .summary-ribbon-pull::before {
    inset: 12px 9px 38px;
    border-left: 1px solid rgba(20,20,20,.22);
    border-right: 1px solid rgba(20,20,20,.22);
    background:
      radial-gradient(ellipse at 30% 18%, rgba(255,255,255,.46), transparent 34%),
      linear-gradient(90deg, rgba(20,20,20,.08), transparent 18%, rgba(255,255,255,.18) 42%, rgba(20,20,20,.07) 72%, transparent);
    transform: translateZ(1px);
  }
  .summary-ribbon-pull::after {
    left: 10px;
    right: 10px;
    bottom: 16px;
    height: 1px;
    border-top: 1px solid rgba(20,20,20,.28);
  }
  .ribbon-title {
    position: absolute;
    width: 1px;
    height: 1px;
    overflow: hidden;
    clip-path: inset(50%);
    white-space: nowrap;
  }
  .ribbon-line {
    display: block;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-family: var(--mono);
    font-size: .68rem;
    font-weight: 800;
    letter-spacing: .14em;
    line-height: 1;
    color: var(--ink);
    margin: 16px 0 22px;
    position: relative;
    z-index: 2;
    text-shadow: 0 1px 0 rgba(250,248,243,.72), 0 10px 18px rgba(20,20,20,.18);
  }
  .ribbon-meta { display: none; }
  .ribbon-handle {
    position: absolute;
    left: 50%;
    bottom: -22px;
    width: 52px;
    height: 22px;
    transform: translateX(-50%);
    border: 1px solid var(--rule);
    border-top: none;
    border-radius: 0 0 6px 6px;
    background: var(--ink);
    color: var(--paper);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: .14em;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 12px 18px rgba(20,20,20,.14);
    z-index: 3;
  }
  .summary-physics.primed .ribbon-handle { background: var(--accent); }
  .engine-card-matter .engine-viewport,
  .engine-card-planck .engine-viewport,
  .engine-card-three .engine-viewport {
    filter: drop-shadow(0 12px 18px rgba(20,20,20,.14));
  }
  .summary-sheet {
    position: fixed;
    top: 118px;
    right: max(24px, calc((100vw - 920px) / 2));
    width: min(560px, calc(100vw - 132px));
    max-height: calc(100vh - 152px);
    margin: 0;
    padding: 0 28px;
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: color-mix(in srgb, var(--paper) 96%, white);
    box-shadow: 0 24px 70px rgba(20,20,20,.18);
    opacity: 0;
    overflow: auto;
    pointer-events: none;
    text-align: left;
    transform: translateX(18px) translateY(-8px);
    z-index: 88;
    transition:
      opacity .28s ease,
      transform .55s cubic-bezier(.18,.72,.18,1),
      padding .55s cubic-bezier(.18,.72,.18,1);
  }
  .summary-physics.open .summary-sheet {
    opacity: 1;
    padding: 28px;
    pointer-events: auto;
    transform: translateX(0) translateY(0);
  }
  .summary-sheet-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--rule-soft);
    margin-bottom: 24px;
  }
  .summary-sheet-kicker {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .summary-sheet-title {
    font-family: var(--serif);
    font-size: clamp(1.55rem, 3.2vw, 2.2rem);
    line-height: 1.12;
    font-weight: 900;
    letter-spacing: 0;
    word-break: keep-all;
    overflow-wrap: break-word;
    text-wrap: balance;
  }
  .summary-close {
    flex: 0 0 auto;
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: transparent;
    color: var(--ink);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    padding: 9px 12px;
    cursor: pointer;
  }
  .summary-close:hover { background: var(--ink); color: var(--paper); }
  .summary-copy p {
    font-family: var(--serif);
    font-size: clamp(1.02rem, 2vw, 1.13rem);
    line-height: 1.9;
    color: var(--ink-2);
    margin-bottom: 18px;
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  .summary-copy p:last-child { margin-bottom: 0; }
  .summary-copy p:first-of-type::first-letter {
    font-size: 3.2rem;
    line-height: .9;
    float: left;
    font-weight: 900;
    color: var(--accent);
    margin: 8px 10px 0 0;
  }
  @media (max-width: 720px) {
    .daily-ribbon-stage {
      top: 206px;
      left: 8px;
      right: auto;
      width: calc(100vw - 16px);
      height: 260px;
    }
    .physics-lab-panel { padding: 10px; }
    .physics-lab-head { display: block; }
    .physics-lab-note { margin-top: 5px; }
    .physics-lab-grid {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
    }
    .physics-engine-card {
      flex: 0 0 190px;
      min-height: 158px;
      scroll-snap-align: start;
    }
    .summary-ribbon-pull {
      width: 44px;
      min-height: 104px;
    }
    .ribbon-line {
      font-size: .62rem;
      margin-bottom: 14px;
    }
    .ribbon-handle {
      width: 44px;
      height: 22px;
      bottom: -22px;
    }
    .summary-sheet {
      top: max(8px, env(safe-area-inset-top));
      right: 8px;
      left: 8px;
      width: auto;
      max-height: calc(100vh - max(8px, env(safe-area-inset-top)) - 48px);
      max-height: calc(100dvh - max(8px, env(safe-area-inset-top)) - max(48px, env(safe-area-inset-bottom)));
      padding: 0 18px;
      border-radius: 6px;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    .summary-physics.open .summary-sheet {
      padding: 18px 18px max(56px, calc(34px + env(safe-area-inset-bottom)));
    }
    .summary-sheet-head {
      display: block;
    }
    .summary-close {
      margin-top: 16px;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .summary-ribbon-pull,
    .summary-sheet,
    .summary-physics {
      transition: none;
    }
  }

  /* ── MAIN grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0;
  }
  @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
  .card {
    padding: 28px 24px;
    border-right: 1px solid var(--rule-soft);
    border-bottom: 1px solid var(--rule-soft);
    cursor: pointer;
    transition: background .2s;
  }
  .card:hover { background: var(--paper-alt); }
  .card:nth-child(2n) { border-right: none; }
  @media (max-width: 640px) {
    .card { border-right: none; padding: 24px 4px; }
  }
  .card .num {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-4);
    letter-spacing: 0.15em;
    margin-bottom: 10px;
  }
  .card h3 {
    font-family: var(--serif);
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 10px;
  }
  .card p {
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--ink-3);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── More button ── */
  .more-wrap {
    text-align: center;
    padding: 56px 24px 24px;
  }
  .more-btn {
    display: inline-block;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    padding: 14px 32px;
    border: 1px solid var(--ink);
    background: var(--paper);
    transition: all .2s;
  }
  .more-btn:hover { background: var(--ink); color: var(--paper); }

  /* ── Modal reader ── */
  .reader {
    position: fixed; inset: 0;
    background: rgba(20, 20, 20, 0.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);

        positions[idx * 3 + 2] = 0;
        uvs[idx * 2] = u;
        uvs[idx * 2 + 1] = v;
      }
    }
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        const a = vertexIndex(x, y);
        const b = vertexIndex(x + 1, y);
        const c = vertexIndex(x, y + 1);
        const d = vertexIndex(x + 1, y + 1);
        indices.push(a, c, b, b, c, d);
      }
    }
    for (let y = 0; y <= rows; y++) {
      for (let x = 0; x <= cols; x++) {
        const i = vertexIndex(x, y);
        if (x < cols) addConstraint(i, vertexIndex(x + 1, y), 'stretch');
        if (y < rows) addConstraint(i, vertexIndex(x, y + 1), 'stretch');
        if (x < cols && y < rows) addConstraint(i, vertexIndex(x + 1, y + 1), 'shear');
        if (x > 0 && y < rows) addConstraint(i, vertexIndex(x - 1, y + 1), 'shear');
        if (x + 2 <= cols) addConstraint(i, vertexIndex(x + 2, y), 'bend');
        if (y + 2 <= rows) addConstraint(i, vertexIndex(x, y + 2), 'bend');
      }
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setIndex(indices);
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
    geometry.computeVertexNormals();
    const material = new THREE.MeshStandardMaterial({
      color: 0xb91c1c,
      roughness: .74,
      metalness: 0,
      side: THREE.DoubleSide,
      transparent: false,
    });
    const mesh = new THREE.Mesh(geometry, material);
    mesh.rotation.x = -.08;
    scene.add(mesh);
    scene.add(new THREE.AmbientLight(0xffffff, 1.8));
    const keyLight = new THREE.DirectionalLight(0xffffff, 2.4);
    keyLight.position.set(-1.2, 1.8, 3.4);
    scene.add(keyLight);
    const rimLight = new THREE.DirectionalLight(0xb91c1c, .9);
    rimLight.position.set(1.2, -1.1, 2.6);
    scene.add(rimLight);

    let lastTime = performance.now();
    let elapsed = 0;

    function resize() {
      const w = Math.max(120, Math.round(canvas.clientWidth || 180));
      const h = Math.max(120, Math.round(canvas.clientHeight || 150));
      renderer.setSize(w, h, false);
    }
    function solveConstraint(c) {
      const a = particles[c.a];
      const b = particles[c.b];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dz = b.z - a.z;
      const dist = Math.hypot(dx, dy, dz) || .0001;
      const stiffness = c.kind === 'bend' ? .22 : c.kind === 'shear' ? .38 : .74;
      const correction = (dist - c.rest) / dist * stiffness * .5;
      const cx = dx * correction;
      const cy = dy * correction;
      const cz = dz * correction;
      if (!a.pinned) { a.x += cx; a.y += cy; a.z += cz; }
      if (!b.pinned) { b.x -= cx; b.y -= cy; b.z -= cz; }
    }
    function step(input = { x: 0, y: 0, vx: 0 }) {
      // Verlet integration keeps the cloth state stable without a heavier physics engine.
      const now = performance.now();
      const dt = Math.min(32, now - lastTime) / 16.6667;
      lastTime = now;
      elapsed += dt * .016;
      const pullX = clamp((input.x || 0) / 44, -1.15, 1.15);
      const pullY = clamp((input.y || 0) / 112, -.24, 1.08);
      const velocityKick = clamp((input.vx || 0) / 24, -1, 1);
      particles.forEach((p) => {
        const falloff = p.v * p.v;
        if (p.pinned) {
          p.x = p.restX + pullX * .03;
          p.y = p.restY;
          p.z = Math.sin(elapsed * 2.2 + p.u * 4.8) * .006;
          p.prevX = p.x;
          p.prevY = p.y;
          p.prevZ = p.z;
          return;
        }
        const vx = (p.x - p.prevX) * .982;
        const vy = (p.y - p.prevY) * .982;
        const vz = (p.z - p.prevZ) * .982;
        p.prevX = p.x;
        p.prevY = p.y;
        p.prevZ = p.z;
        const wave = Math.sin(elapsed * 1.8 + p.v * 10.4 + p.u * 5.1);
        const side = Math.sin((p.u - .5) * Math.PI);
        p.x += vx + pullX * .72 * falloff * .024 + velocityKick * falloff * .01;
        p.y += vy - .0038 * dt - pullY * falloff * .012;
        p.z += vz + wave * .018 * falloff + side * pullX * .085 * falloff;
      });
      for (let i = 0; i < 5; i++) {
        constraints.forEach(solveConstraint);
      }
      particles.forEach((p, idx) => {
        const crease = Math.sin(p.v * Math.PI * 7 + elapsed * 1.8) * Math.sin(p.u * Math.PI);
        positions[idx * 3] = p.x;
        positions[idx * 3 + 1] = p.y;
        positions[idx * 3 + 2] = p.z + crease * .085 * p.v * .38;
      });
      geometry.attributes.position.needsUpdate = true;
      geometry.computeVertexNormals();
      mesh.rotation.z = clamp(input.x * .0028, -.18, .18);
      mesh.rotation.y = clamp(-input.x * .006, -.28, .28);
      renderer.render(scene, camera);
    }
    let dragging = false;
    let startY = 0;
    canvas.addEventListener('pointerdown', (e) => {
      dragging = true;
      startY = e.offsetY;
      canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      step({ x: e.offsetX - canvas.clientWidth / 2, y: e.offsetY - startY, vx: e.movementX || 0 });
    });
    function release(e) {
      if (!dragging) return;
      dragging = false;
      if (canvas.hasPointerCapture(e.pointerId)) canvas.releasePointerCapture(e.pointerId);
      if (e.offsetY - startY > 34) setOpen(true);
    }
    canvas.addEventListener('pointerup', release);
    canvas.addEventListener('pointercancel', release);
    card.addEventListener('click', (e) => { if (e.target === canvas) return; setOpen(true); });
    window.addEventListener('resize', resize);
    resize();
    card.dataset.engineStatus = 'ready';
    return {
      update(input) { if (!reduced) step(input); },
      dispose() {
        renderer.dispose();
        geometry.dispose();
        material.dispose();
      },
    };
  }
  function renderDailyRibbon(summary) {
    const stage = $('daily-summary-stage');
    if (!stage || !summary || !summary.body) return;
    const title = summary.title || "오늘의 AI 업데이트";
    stage.hidden = false;
    stage.innerHTML = `
      <div class="summary-physics" id="summary-physics">
        <section class="physics-lab-panel" aria-label="Don't Die physics comparison">
          <div class="physics-lab-head">
            <div class="physics-lab-kicker">Don't Die Physics Bench</div>
            <div class="physics-lab-note">Pull any candidate · tap to open summary</div>
          </div>
          <div class="physics-lab-grid">
            <div class="physics-engine-card engine-card-native" data-summary-engine="native-spring" data-engine-status="loading">
              <div class="engine-viewport">
                <button class="summary-ribbon-pull" type="button" aria-expanded="false" aria-controls="summary-sheet" aria-label="Native Spring Don't Die 요약 열기">
                  <span class="ribbon-title">${esc(title)}</span>
                  <span class="ribbon-line">Don't Die.</span>
                  <span class="ribbon-meta" aria-hidden="true"></span>
                  <span class="ribbon-handle">PULL</span>
                </button>
              </div>
              <div class="engine-caption"><span class="engine-name">Native Spring</span><span class="engine-hint">CSS + JS spring</span></div>
            </div>
            <div class="physics-engine-card engine-card-matter" data-summary-engine="matter-chain" data-engine-status="loading">
              <div class="engine-viewport"><canvas class="engine-canvas" aria-hidden="true"></canvas></div>
              <div class="engine-caption"><span class="engine-name">Matter.js</span><span class="engine-hint">constraint chain</span></div>
            </div>
            <div class="physics-engine-card engine-card-planck" data-summary-engine="planck-rope" data-engine-status="loading">
              <div class="engine-viewport"><canvas class="engine-canvas" aria-hidden="true"></canvas></div>
              <div class="engine-caption"><span class="engine-name">Planck.js</span><span class="engine-hint">Box2D rope</span></div>
            </div>
            <div class="physics-engine-card engine-card-three" data-summary-engine="three-cloth" data-engine-status="loading">
              <div class="engine-viewport"><canvas class="engine-canvas" aria-hidden="true"></canvas></div>
              <div class="engine-caption"><span class="engine-name">Three.js</span><span class="engine-hint">Verlet cloth</span></div>
            </div>
          </div>
        </section>
        <article class="summary-sheet" id="summary-sheet" aria-hidden="true">
          <div class="summary-sheet-head">
            <div>
              <div class="summary-sheet-kicker">Don't Die. · ${esc(summary.date || '')}</div>
              <h2 class="summary-sheet-title">${formatInlineText(title)}</h2>
            </div>
            <button class="summary-close" id="summary-close" type="button">접기</button>
          </div>
          <div class="summary-copy">
            ${paragraphs(summary.body).map(p => `<p>${formatInlineText(p)}</p>`).join('')}
          </div>
        </article>
      </div>
    `;

    const physics = $('summary-physics');
    const sheet = $('summary-sheet');
    const close = $('summary-close');
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    let openState = false;
    const engineLabs = [];
    function setOpen(next) {
      openState = next;
      physics.classList.toggle('open', next);
      physics.classList.remove('primed');
      physics.querySelectorAll('.summary-ribbon-pull').forEach((button) => {
        button.setAttribute('aria-expanded', String(next));
      });
      sheet.setAttribute('aria-hidden', String(!next));
    }
    const nativeCard = physics.querySelector('[data-summary-engine="native-spring"]');
    const matterCard = physics.querySelector('[data-summary-engine="matter-chain"]');
    const planckCard = physics.querySelector('[data-summary-engine="planck-rope"]');
    const threeCard = physics.querySelector('[data-summary-engine="three-cloth"]');
    engineLabs.push(initNativeSpringBookmark({ card: nativeCard, setOpen, reduced }));
    initMatterChainTag({ card: matterCard, setOpen, reduced }).then((lab) => engineLabs.push(lab)).catch(() => matterCard.dataset.engineStatus = 'fallback');
    initPlanckRopeTag({ card: planckCard, setOpen, reduced }).then((lab) => engineLabs.push(lab)).catch(() => planckCard.dataset.engineStatus = 'fallback');
    initThreeClothTag({ card: threeCard, setOpen, reduced }).then((lab) => engineLabs.push(lab)).catch(() => threeCard.dataset.engineStatus = 'fallback');
    function tick() {
      engineLabs.forEach((lab) => lab && lab.update && lab.update({ open: openState }));
      requestAnimationFrame(tick);
    }
    function closeSummarySheet(e) {
      e.preventDefault();
      e.stopPropagation();
      setOpen(false);
    }
    close.addEventListener('pointerdown', closeSummarySheet);
    close.addEventListener('click', closeSummarySheet);
    requestAnimationFrame(tick);
  }

  let data;
  const inlineEl = document.getElementById('articles-data');
  const inlineRaw = inlineEl ? inlineEl.textContent.trim() : '';
  if (inlineRaw && !inlineRaw.startsWith('__')) {
    try { data = JSON.parse(inlineRaw); }
    catch (e) {
      $('center').innerHTML = `<div class="error">인라인 파싱 실패 · ${esc(e.message)}</div>`; return;
    }
  } else {
    try {
      const res = await fetch('articles.json?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      data = await res.json();
    } catch (e) {
      $('center').innerHTML = `<div class="error">기사를 불러오지 못했습니다 · ${esc(e.message)}</div>`; return;
    }
  }

  const all = data.articles || [];
  const gen = data.generated_at;
  $('topbar-date').textContent = fmtTime(gen);
  $('masthead-date').textContent = fmtDate(gen, { weekday: true });
  $('masthead-source').textContent = `${all.length} STORIES · UPDATED ${fmtTime(gen)}`;
  $('footer-meta').textContent = `GENERATED ${fmtTime(gen)}`;
  renderDailyRibbon(data.daily_summary);

  if (!all.length) {
    $('center').innerHTML = `<div class="empty">표시할 기사가 없습니다.</div>`;
    return;
  }

  const byPlacement = (p) => all.filter(a => a.placement === p)
    .sort((a,b) => (b.placed_at || '').localeCompare(a.placed_at || ''));
  const top = byPlacement('top');
  const main = byPlacement('main');
  const side = byPlacement('side');

  // Tag badge renderer
  function tagBadges(a) {
    const cat = a.category || '';
    const trust = a.trust || '';
    let out = '';
    if (cat === 'rumor') out += '<span class="tag rumor">찌라시</span>';
    if (trust === 'low') out += '<span class="tag trust-low">낮은 신뢰</span>';
    return out;
  }

  // ── Center render ──
  let html = '';
  if (top[0]) {
    const t = top[0];
    html += `
      <div class="section-label"><span>TOP STORY</span></div>
      <article class="hero" data-id="${esc(t.id)}">
        <div class="kicker">LEAD ${tagBadges(t)}</div>
        <h2>${formatInlineText(t.headline)}</h2>
        <p class="lede">${formatInlineText(excerpt(t.body, 240))}</p>
        <div class="read-more">Read the full story</div>
      </article>
    `;
  }
  if (main.length) {
    html += `<div class="section-label"><span>MAIN · ${main.length}/6</span></div><div class="grid">`;
    main.forEach((a, i) => {
      html += `
        <article class="card" data-id="${esc(a.id)}">
          <div class="num">No. ${String(i + 1).padStart(2, '0')} ${tagBadges(a)}</div>
          <h3>${formatInlineText(a.headline)}</h3>
          <p>${formatInlineText(excerpt(a.body, 180))}</p>
        </article>
      `;
    });
    html += `</div>`;
  }
  if (!top.length && !main.length) {
    html += `<div class="empty">메인 기사 없음. 사이드 또는 더보기를 확인하세요.</div>`;
  }
  $('center').innerHTML = html;

  // ── Sides render (split 3-way: left, center-extra, right) ──
  function sideCard(a, n, withSnip) {
    const snip = withSnip ? `<div class="snip">${formatInlineText(excerpt(a.body, 120))}</div>` : '';
    return `
      <div class="side-item" data-id="${esc(a.id)}">
        <div class="num">No. ${String(n).padStart(2, '0')} ${tagBadges(a)}</div>
        <div class="t">${formatInlineText(a.headline)}</div>
        ${snip}
      </div>
    `;
  }
  // 3-way split: i%3 — 0→left, 1→center-extra, 2→right
  const leftItems = side.filter((_, i) => i % 3 === 0);
  const centerExtraItems = side.filter((_, i) => i % 3 === 1);
  const rightItems = side.filter((_, i) => i % 3 === 2);

  $('side-left').innerHTML = leftItems
    .map((a, i) => sideCard(a, i * 3 + 1, true)).join('');
  $('side-right').innerHTML = rightItems
    .map((a, i) => sideCard(a, i * 3 + 3, true)).join('');

  // Center extra: append to main content as a second grid of side items
  if (centerExtraItems.length) {
    const extraHtml = `
      <div class="section-label"><span>MORE</span></div>
      <div class="more-list">
        ${centerExtraItems.map((a, i) => sideCard(a, i * 3 + 2, true)).join('')}
      </div>
    `;
    $('center').insertAdjacentHTML('beforeend', extraHtml);
  }

  // ── Reader modal ──
  const byId = Object.fromEntries(all.map(a => [a.id, a]));
  const reader = $('reader');
  function openReader(id) {
    const a = byId[id];
    if (!a) return;
    $('reader-title').innerHTML = formatInlineText(a.headline);
    $('reader-byline').textContent = `FIRST LIGHT AI · ${fmtDate(a.placed_at || gen)}`;
    $('reader-body').innerHTML = paragraphs(a.body).map(p => `<p>${formatInlineText(p)}</p>`).join('');
    reader.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeReader() {
    reader.classList.remove('open');
    document.body.style.overflow = '';
  }
  $('reader-close').addEventListener('click', closeReader);
  reader.addEventListener('click', (e) => { if (e.target === reader) closeReader(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeReader(); });
  document.querySelectorAll('[data-id]').forEach(el => {
    el.addEventListener('click', () => openReader(el.dataset.id));
  });
})();
</script>
</body>
</html>
