name: Crawl Public Sources To Supabase

on:
  schedule:
    # 07:00 KST = 22:00 UTC on the previous day.
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: first-light-ai-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run public crawlers
        run: python3 crawlers/run_public.py

      - name: Check crawler output
        shell: bash
        run: |
          shopt -s nullglob
          files=(data/crawled/*.jsonl)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No JSONL files produced under data/crawled" >&2
            exit 1
          fi
          printf 'Produced %s JSONL files:\n' "${#files[@]}"
          printf '  %s\n' "${files[@]}"

      - name: Ingest into Supabase posts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 db/supabase_ingest.py data/crawled/*.jsonl

      - name: Upload crawler JSONL artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-crawled-jsonl
          path: data/crawled/*.jsonl
          if-no-files-found: ignore
          retention-days: 3
