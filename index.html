<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="AI 커뮤니티의 첫 빛을 추적합니다."/>
<title>First Light AI — 데일리 브리핑</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --paper: #faf8f3;
    --paper-alt: #f3f0e7;
    --ink: #141414;
    --ink-2: #2b2b2b;
    --ink-3: #5a5a5a;
    --ink-4: #8a8a8a;
    --rule: #1a1a1a;
    --rule-soft: #d9d5c7;
    --accent: #b91c1c;
    --accent-soft: #fef2f2;
    --serif: 'Noto Serif KR', 'Times New Roman', serif;
    --sans: 'Noto Sans KR', -apple-system, 'Segoe UI', sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; overflow-x: hidden; }
  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ── Topbar ── */
  .topbar {
    border-bottom: 1px solid var(--rule-soft);
    background: var(--paper);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--ink-3);
  }
  .topbar-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 24px;
    max-width: 1320px;
    margin: 0 auto;
    text-transform: uppercase;
  }
  .topbar .pulse {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); margin-right: 6px; vertical-align: middle;
    animation: pulse 2s infinite;
  }
  .topbar-right {
    display: inline-flex; align-items: center; gap: 14px;
  }
  .topbar-link {
    color: var(--accent); text-decoration: none;
    font-weight: 600; letter-spacing: 0.12em;
    padding: 3px 8px; border: 1px solid var(--accent);
    border-radius: 2px;
    transition: all .15s;
  }
  .topbar-link:hover {
    background: var(--accent); color: var(--paper);
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Masthead ── */
  .masthead {
    position: relative;
    overflow: visible;
    text-align: center;
    padding: 48px 24px 28px;
    border-bottom: 3px double var(--rule);
    max-width: 1320px;
    margin: 0 auto;
  }
	  .masthead h1 {
	    font-family: var(--serif);
	    font-weight: 900;
	    font-size: 5rem;
	    letter-spacing: -0.02em;
	    line-height: 0.9;
	    color: var(--ink);
	  }
	  @media (max-width: 720px) {
	    .masthead h1 { font-size: 2.6rem; }
	  }
  .masthead .tagline {
    font-family: var(--serif);
    font-style: italic;
    font-size: 1.05rem;
    color: var(--ink-3);
    margin-top: 14px;
    font-weight: 400;
  }
  .masthead .meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-4);
    margin-top: 18px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .masthead .meta .dot { margin: 0 10px; opacity: 0.5; }

  /* ── Layout: sides + center ── */
  .layout {
    max-width: 1560px;
    margin: 0 auto;
    padding: 32px 24px 0;
    display: grid;
    grid-template-columns: 300px minmax(0, 820px) 300px;
    gap: 44px;
    justify-content: center;
    align-items: start;
  }
  @media (max-width: 1280px) {
    .layout {
      display: flex;
      flex-direction: column;
      grid-template-columns: 1fr;
      padding: 32px 18px 0;
      gap: 0;
    }
    .center { order: 1; }
    .side-left { order: 2; margin-top: 40px; }
    .side-right { order: 3; margin-top: 0; }
  }

  /* ── Side columns (larger, no labels) ── */
  .side { }
  @media (max-width: 1280px) {
    .side { position: static; }
  }
  .side-item {
    padding: 18px 0;
    border-bottom: 1px solid var(--rule-soft);
    cursor: pointer;
    transition: opacity .15s;
  }
  .side-item:first-child { padding-top: 4px; }
  .side-item:hover { opacity: 0.65; }
  .side-item:last-child { border-bottom: none; }
  .side-item .num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-4);
    letter-spacing: 0.12em;
    margin-bottom: 6px;
  }
  .side-item .t {
    font-family: var(--serif);
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.35;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .side-item .snip {
    font-size: 0.82rem;
    line-height: 1.55;
    color: var(--ink-3);
    margin-top: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Section heading (center) ── */
  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 40px 0 24px;
  }
  .section-label:first-child { margin-top: 0; }
  .section-label::before, .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--rule-soft);
  }

  /* ── Tag badges ── */
  .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 2px;
    margin-right: 4px;
    vertical-align: middle;
  }
  .tag.rumor { background: #f97316; color: white; }
  .tag.news { display: none; }  /* news는 기본이라 표시 안 함 */
  .tag.trust-low { background: transparent; color: var(--ink-4); border: 1px solid var(--rule-soft); }
  .tag.trust-high { display: none; }  /* high는 기본 표시 안 함 */

  /* ── Hero (TOP) ── */
  .hero {
    padding: 4px 0 40px;
    cursor: pointer;
    transition: opacity .2s;
  }
  .hero:hover { opacity: 0.88; }
  .hero .kicker {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .hero h2 {
    font-family: var(--serif);
    font-size: clamp(1.8rem, 4.5vw, 2.8rem);
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 18px;
  }
  .hero .lede {
    font-family: var(--serif);
    font-size: 1.12rem;
    line-height: 1.7;
    color: var(--ink-2);
  }
  .hero .read-more {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 22px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .hero .read-more::after { content: '→'; transition: transform .2s; }
  .hero:hover .read-more::after { transform: translateX(4px); }

  /* ── Daily visual candidate lab ── */
  .daily-ribbon-stage {
    position: absolute;
    top: 128px;
    left: max(18px, calc(50% - 530px));
    width: min(1060px, calc(100vw - 36px));
    height: 386px;
    margin: 0;
    padding: 0;
    z-index: 60;
    pointer-events: none;
  }
  .daily-ribbon-stage[hidden] { display: none; }
  .summary-physics {
    position: relative;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .summary-physics.open {}
  .physics-lab-panel {
    pointer-events: auto;
    text-align: left;
    background:
      radial-gradient(circle at 12% 0%, rgba(255,255,255,.78), transparent 28%),
      linear-gradient(180deg, rgba(250,248,243,.98), rgba(238,235,226,.95)),
      repeating-linear-gradient(90deg, rgba(20,20,20,.026) 0 1px, transparent 1px 18px);
    border: 1px solid var(--rule);
    border-radius: 6px;
    box-shadow: 0 28px 70px rgba(20,20,20,.16), inset 0 1px 0 rgba(255,255,255,.75);
    padding: 12px;
  }
  .physics-lab-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 16px;
    padding: 0 2px 10px;
    border-bottom: 1px solid var(--rule-soft);
    margin-bottom: 10px;
  }
  .physics-lab-kicker {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 800;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .physics-lab-note {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: .1em;
    color: var(--ink-4);
    text-transform: uppercase;
  }
  .physics-lab-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 9px;
  }
  .physics-engine-card {
    position: relative;
    min-height: 154px;
    border: 1px solid var(--rule-soft);
    border-radius: 6px;
    background:
      radial-gradient(circle at 18% 14%, rgba(255,255,255,.7), transparent 34%),
      linear-gradient(145deg, rgba(255,255,255,.5), rgba(20,20,20,.045)),
      color-mix(in srgb, var(--paper) 94%, white);
    color: var(--ink);
    overflow: hidden;
    cursor: grab;
    touch-action: none;
    user-select: none;
    transform-style: preserve-3d;
    perspective: 620px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.68), 0 12px 24px rgba(20,20,20,.08);
  }
  .physics-engine-card:active { cursor: grabbing; }
  .physics-engine-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(115deg, rgba(255,255,255,.22), transparent 32%, rgba(20,20,20,.08) 74%, transparent),
      radial-gradient(circle at 78% 86%, rgba(20,20,20,.1), transparent 36%);
    pointer-events: none;
    z-index: 1;
  }
  .physics-engine-card[data-engine-status="ready"] {
    border-color: color-mix(in srgb, var(--accent) 54%, var(--rule-soft));
  }
  .engine-viewport {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .engine-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  .engine-caption {
    position: absolute;
    left: 10px;
    right: 10px;
    bottom: 8px;
    z-index: 4;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 10px;
    pointer-events: none;
  }
  .engine-name {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 900;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .engine-hint {
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ink-4);
    text-align: right;
  }
  .physics-engine-card[data-engine-status="drawing"] .engine-name::after {
    content: ' · drawing';
    color: var(--ink-4);
    font-weight: 700;
  }
  .summary-sheet {
    position: fixed;
    top: 118px;
    right: max(24px, calc((100vw - 920px) / 2));
    width: min(560px, calc(100vw - 132px));
    max-height: calc(100vh - 152px);
    margin: 0;
    padding: 0 28px;
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: color-mix(in srgb, var(--paper) 96%, white);
    box-shadow: 0 24px 70px rgba(20,20,20,.18);
    opacity: 0;
    overflow: auto;
    pointer-events: none;
    text-align: left;
    transform: translateX(18px) translateY(-8px);
    z-index: 88;
    transition:
      opacity .28s ease,
      transform .55s cubic-bezier(.18,.72,.18,1),
      padding .55s cubic-bezier(.18,.72,.18,1);
  }
  .summary-physics.open .summary-sheet {
    opacity: 1;
    padding: 28px;
    pointer-events: auto;
    transform: translateX(0) translateY(0);
  }
  .summary-sheet-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--rule-soft);
    margin-bottom: 24px;
  }
  .summary-sheet-kicker {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .summary-sheet-title {
    font-family: var(--serif);
    font-size: clamp(1.55rem, 3.2vw, 2.2rem);
    line-height: 1.12;
    font-weight: 900;
    letter-spacing: 0;
    word-break: keep-all;
    overflow-wrap: break-word;
    text-wrap: balance;
  }
  .summary-close {
    flex: 0 0 auto;
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: transparent;
    color: var(--ink);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    padding: 9px 12px;
    cursor: pointer;
  }
  .summary-close:hover { background: var(--ink); color: var(--paper); }
  .summary-copy p {
    font-family: var(--serif);
    font-size: clamp(1.02rem, 2vw, 1.13rem);
    line-height: 1.9;
    color: var(--ink-2);
    margin-bottom: 18px;
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  .summary-copy p:last-child { margin-bottom: 0; }
  .summary-copy p:first-of-type::first-letter {
    font-size: 3.2rem;
    line-height: .9;
    float: left;
    font-weight: 900;
    color: var(--accent);
    margin: 8px 10px 0 0;
  }
  @media (max-width: 720px) {
    .daily-ribbon-stage {
      top: 156px;
      left: 8px;
      right: auto;
      width: calc(100vw - 16px);
      height: 636px;
    }
    .physics-lab-panel { padding: 8px; }
    .physics-lab-head { display: block; }
    .physics-lab-note { margin-top: 5px; }
    .physics-lab-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
      padding-bottom: 0;
    }
    .physics-engine-card {
      min-height: 91px;
      scroll-snap-align: none;
    }
    .engine-caption {
      left: 7px;
      right: 7px;
      bottom: 5px;
      gap: 5px;
    }
    .engine-name {
      font-size: 8px;
      letter-spacing: .06em;
    }
    .engine-hint {
      font-size: 7px;
      letter-spacing: .06em;
    }
    .summary-sheet {
      top: max(8px, env(safe-area-inset-top));
      right: 8px;
      left: 8px;
      width: auto;
      max-height: calc(100vh - max(8px, env(safe-area-inset-top)) - 48px);
      max-height: calc(100dvh - max(8px, env(safe-area-inset-top)) - max(48px, env(safe-area-inset-bottom)));
      padding: 0 18px;
      border-radius: 6px;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    .summary-physics.open .summary-sheet {
      padding: 18px 18px max(56px, calc(34px + env(safe-area-inset-bottom)));
    }
    .summary-sheet-head {
      display: block;
    }
    .summary-close {
      margin-top: 16px;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .physics-engine-card,
    .summary-sheet,
    .summary-physics {
      transition: none;
    }
  }

  /* ── MAIN grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0;
  }
  @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
  .card {
    padding: 28px 24px;
    border-right: 1px solid var(--rule-soft);
    border-bottom: 1px solid var(--rule-soft);
    cursor: pointer;
    transition: background .2s;
  }
  .card:hover { background: var(--paper-alt); }
  .card:nth-child(2n) { border-right: none; }
  @media (max-width: 640px) {
    .card { border-right: none; padding: 24px 4px; }
  }
  .card .num {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-4);
    letter-spacing: 0.15em;
    margin-bottom: 10px;
  }
  .card h3 {
    font-family: var(--serif);
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 10px;
  }
  .card p {
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--ink-3);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── More button ── */
  .more-wrap {
    text-align: center;
    padding: 56px 24px 24px;
  }
  .more-btn {
    display: inline-block;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    padding: 14px 32px;
    border: 1px solid var(--ink);
    background: var(--paper);
    transition: all .2s;
  }
  .more-btn:hover { background: var(--ink); color: var(--paper); }

  /* ── Modal reader ── */
  .reader {
    position: fixed; inset: 0;
    background: rgba(20, 20, 20, 0.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: flex-start;
    justify-content: center;
    z-index: 100;
    padding: 40px 20px;
    overflow-y: auto;
  }
  .reader.open { display: flex; animation: fadein .25s ease; }
  @keyframes fadein { from{opacity:0} to{opacity:1} }
  .reader-panel {
    background: var(--paper);
    max-width: 760px; width: 100%;
    padding: 56px 56px 64px;
    border: 1px solid var(--rule-soft);
    box-shadow: 0 30px 80px rgba(0,0,0,0.25);
    position: relative;
  }
  @media (max-width: 600px) {
    .reader-panel { padding: 40px 24px 48px; }
  }
  .reader-close {
    position: absolute; top: 18px; right: 22px;
    background: none; border: none;
    font-size: 28px; color: var(--ink-3);
    cursor: pointer; line-height: 1;
    padding: 6px 10px; font-family: var(--serif);
  }
  .reader-close:hover { color: var(--ink); }
  .reader .kicker {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
  }
  .reader h2 {
    font-family: var(--serif);
    font-size: clamp(1.7rem, 4vw, 2.4rem);
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 20px;
  }
  .reader .byline {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-4);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--rule-soft);
    margin-bottom: 28px;
  }
  .reader .body {
    font-family: var(--serif);
    font-size: 1.08rem;
    line-height: 1.85;
    color: var(--ink-2);
  }
  .reader .body p {
    margin-bottom: 18px;
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  .reader .body p:first-of-type::first-letter {
    font-size: 3.6rem;
    font-weight: 700;
    float: left;
    line-height: 0.9;
    margin: 6px 10px 0 0;
    color: var(--accent);
    font-family: var(--serif);
  }

  /* ── Footer ── */
  .footer {
    border-top: 3px double var(--rule);
    margin-top: 40px;
    padding: 40px 24px 60px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-4);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 2;
    max-width: 1320px;
    margin-left: auto;
    margin-right: auto;
  }
  .footer strong { color: var(--ink-2); font-weight: 600; }

  .loading, .error, .empty {
    text-align: center;
    padding: 60px 20px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-4);
    letter-spacing: 0.1em;
  }
  .error { color: var(--accent); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <span><span class="pulse"></span>LIVE · FIRST LIGHT AI</span>
    <span class="topbar-right">
      <span id="topbar-date">—</span>

  function candidatePalette(candidate) {

  function roundRect(ctx, x, y, w, h, r) {
    const radius = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.arcTo(x + w, y, x + w, y + h, radius);
    ctx.arcTo(x + w, y + h, x, y + h, radius);
    ctx.arcTo(x, y + h, x, y, radius);
    ctx.arcTo(x, y, x + w, y, radius);
    ctx.closePath();
  }

  function drawSpecularBand(ctx, x, y, w, h, alpha = .34) {
    const shine = ctx.createLinearGradient(x, y, x + w, y + h);
    shine.addColorStop(0, `rgba(255,255,255,${alpha})`);
    shine.addColorStop(.18, 'rgba(255,255,255,0)');
    shine.addColorStop(.58, `rgba(255,255,255,${alpha * .78})`);

    ctx.fill();

  function drawWrinkleLines(ctx, x, y, w, h, count, phase, color) {
    ctx.save();

      ctx.moveTo(px, y + 8);

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.letterSpacing = '0px';
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  function drawCord(ctx, ax, ay, bx, by, sag, color, width = 1.2) {
    ctx.save();
    ctx.strokeStyle = color;

    ctx.moveTo(ax, ay);
    ctx.quadraticCurveTo((ax + bx) / 2, (ay + by) / 2 + sag, bx, by);
    ctx.stroke();
    ctx.restore();

    ctx.shadowBlur = 0;

  function drawKiteCloth(ctx, x, y, w, h, angle, p, phase) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.shadowColor = 'rgba(20,20,20,.18)';
    ctx.shadowBlur = 15;
    ctx.shadowOffsetY = 8;
    ctx.beginPath();
    ctx.moveTo(0, -h / 2);
    ctx.lineTo(w / 2, -h * .06 + Math.sin(phase) * 2);
    ctx.lineTo(0, h / 2);
    ctx.lineTo(-w / 2, -h * .08 - Math.sin(phase) * 2);
    ctx.closePath();
    const g = ctx.createLinearGradient(-w / 2, -h / 2, w / 2, h / 2);
    g.addColorStop(0, p.c);
    g.addColorStop(.36, p.a);
    g.addColorStop(.58, p.b);
    g.addColorStop(1, '#134e4a');
    ctx.fillStyle = g;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = p.line;
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, -h / 2);
    ctx.lineTo(0, h / 2);
    ctx.moveTo(-w / 2, -h * .08);
    ctx.lineTo(w / 2, -h * .06);
    ctx.strokeStyle = 'rgba(255,255,255,.38)';
    ctx.stroke();
    drawWrinkleLines(ctx, -w * .38, -h * .28, w * .76, h * .58, 5, phase, 'rgba(255,255,255,.16)');
    drawCanvasLabel(ctx, 'DIE', 0, h * .04, 0, p.ink, 10);
    ctx.restore();
  }

  function drawVisualCandidate(ctx, candidate, state, t, w, h) {
    const p = candidatePalette(candidate);
    ctx.clearRect(0, 0, w, h);
    const bg = ctx.createLinearGradient(0, 0, w, h);
    bg.addColorStop(0, 'rgba(255,255,255,.34)');
    bg.addColorStop(.52, 'rgba(250,248,243,.18)');
    bg.addColorStop(1, 'rgba(20,20,20,.05)');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);
    const anchorX = w * .5;
    const anchorY = Math.max(12, h * .12);
    const bob = Math.sin(t * 1.8 + state.seed) * 2.2;
    const cx = anchorX + state.x;
    const cy = h * .53 + state.y * .32 + bob;
    const angle = clamp(state.swing + state.x * .004, -.45, .45);
    const scale = clamp(Math.min(w / 190, h / 148), .58, 1.1);
    drawCord(ctx, anchorX - 18 * scale, anchorY, cx - 11 * scale, cy - 46 * scale, 10 + Math.sin(t + state.seed) * 3, p.line, 1.05);
    drawCord(ctx, anchorX + 18 * scale, anchorY, cx + 11 * scale, cy - 46 * scale, 10 - Math.sin(t + state.seed) * 3, p.line, 1.05);
    ctx.fillStyle = p.c;
    ctx.strokeStyle = p.line;
    [anchorX - 18 * scale, anchorX + 18 * scale].forEach((x) => {
      ctx.beginPath();
      ctx.arc(x, anchorY, 3.2 * scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    });
    const phase = t * 2 + state.seed;
    const objectW = 52 * scale;
    const objectH = 82 * scale;
    if (candidate.style === 'silk') drawFoldedRibbon(ctx, cx, cy, objectW, objectH, angle, p, phase);
    else if (candidate.style === 'chain') drawMetalChain(ctx, cx, cy, objectW * 1.08, objectH * .84, angle, p, phase);
    else if (candidate.style === 'glass') drawGlassTag(ctx, cx, cy, objectW * 1.05, objectH * .86, angle, p, phase);
    else if (candidate.style === 'wax') drawWaxSeal(ctx, cx, cy, objectW * 1.1, objectH * .75, angle, p, phase);
    else if (candidate.style === 'origami') drawOrigamiFold(ctx, cx, cy, objectW * 1.1, objectH * .86, angle, p, phase);
    else if (candidate.style === 'carbon') drawCarbonBlade(ctx, cx, cy, objectW, objectH, angle, p, phase);
    else if (candidate.style === 'enamel') drawEnamelPin(ctx, cx, cy, objectW * 1.05, objectH * .84, angle, p, phase);
    else if (candidate.style === 'thread') drawThreadLoop(ctx, cx, cy, objectW * 1.18, objectH * .92, angle, p, phase);
    else if (candidate.style === 'chrome') drawChromeClip(ctx, cx, cy, objectW * 1.18, objectH * .92, angle, p, phase);
    else drawKiteCloth(ctx, cx, cy, objectW * 1.16, objectH * .92, angle, p, phase);
  }

  function initVisualCandidateLab({ card, candidate, setOpen, toggleOpen, reduced }) {
    const canvas = card.querySelector('canvas');
    const state = {
      x: 0,
      y: 0,
      vx: 0,
      vy: 0,
      swing: 0,
      swingVelocity: 0,
      dragging: false,
      startX: 0,
      startY: 0,
      baseX: 0,
      baseY: 0,
      lastX: 0,
      lastY: 0,
      dragDistance: 0,
      seed: VISUAL_CANDIDATES.findIndex((c) => c.id === candidate.id) * .73,
      marked: false,
    };
    function localPoint(e) {
      const rect = canvas.getBoundingClientRect();
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }
    function togglePrimed(next) {
      card.classList.toggle('primed', next);
      card.dataset.engineStatus = next ? 'drawing' : 'ready';
    }
    canvas.addEventListener('pointerdown', (e) => {
      state.dragging = true;
      state.startX = e.clientX;
      state.startY = e.clientY;
      state.baseX = state.x;
      state.baseY = state.y;
      state.lastX = e.clientX;
      state.lastY = e.clientY;
      state.dragDistance = 0;
      canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener('pointermove', (e) => {
      if (!state.dragging) return;
      const dx = e.clientX - state.startX;
      const dy = e.clientY - state.startY;
      state.dragDistance = Math.max(state.dragDistance, Math.hypot(dx, dy));
      state.x = clamp(state.baseX + dx * .52, -42, 42);
      state.y = clamp(state.baseY + dy * .44, -20, 58);
      state.vx = e.clientX - state.lastX;
      state.vy = e.clientY - state.lastY;
      state.swing = clamp(state.x * .012, -.42, .42);
      state.lastX = e.clientX;
      state.lastY = e.clientY;
      togglePrimed(dy > 34);
    });
    function release(e) {
      if (!state.dragging) return;
      state.dragging = false;
      if (canvas.hasPointerCapture(e.pointerId)) canvas.releasePointerCapture(e.pointerId);
      const dy = e.clientY - state.startY;
      state.swingVelocity = clamp(state.vx * .012, -.34, .34);
      togglePrimed(false);
      if (dy > 34) toggleOpen();
    }
    canvas.addEventListener('pointerup', release);
    canvas.addEventListener('pointercancel', release);
    card.addEventListener('click', () => {
      if (state.dragDistance > 6) return;
      toggleOpen();
    });
    card.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        toggleOpen();
      }
    });
    card.dataset.engineStatus = 'ready';
    return {
      update(time) {
        const { ctx, w, h } = resizeCanvas(canvas);
        if (!state.dragging && !reduced) {
          state.vx += -state.x * .085;
          state.vy += -state.y * .09;
          state.vx *= .78;
          state.vy *= .77;
          state.x += state.vx;
          state.y += state.vy;
          state.swingVelocity += -state.swing * .062 + state.vx * .0016;
          state.swingVelocity *= .94;
          state.swing += state.swingVelocity;
        }
        drawVisualCandidate(ctx, candidate, state, time, w, h);
        if (!state.marked) {
          try { card.dataset.preview = canvas.toDataURL('image/png').slice(0, 24); }
          catch { card.dataset.preview = 'blocked'; }
          state.marked = true;
        }
      },
    };
  }

  function renderDailyRibbon(summary) {
    const stage = $('daily-summary-stage');
    if (!stage || !summary || !summary.body) return;
    const title = summary.title || "오늘의 AI 업데이트";
    stage.hidden = false;
    stage.innerHTML = `
      <div class="summary-physics" id="summary-physics">
        <section class="physics-lab-panel" aria-label="Don't Die visual candidate bench">
          <div class="physics-lab-head">
            <div class="physics-lab-kicker">Don't Die. Object Bench</div>
            <div class="physics-lab-note">Pull one object · tap to open</div>
          </div>
          <div class="physics-lab-grid">
            ${VISUAL_CANDIDATES.map((candidate) => `
              <div class="physics-engine-card engine-card-${candidate.id}" role="button" tabindex="0" data-design-engine="${candidate.id}" data-engine-status="drawing" aria-label="${esc(candidate.label)} Don't Die. 요약 열기">
                <div class="engine-viewport"><canvas class="engine-canvas" aria-hidden="true"></canvas></div>
                <div class="engine-caption"><span class="engine-name">${esc(candidate.label)}</span><span class="engine-hint">${esc(candidate.hint)}</span></div>
              </div>
            `).join('')}
          </div>
        </section>
        <article class="summary-sheet" id="summary-sheet" aria-hidden="true">
          <div class="summary-sheet-head">
            <div>
              <div class="summary-sheet-kicker">Don't Die. · ${esc(summary.date || '')}</div>
              <h2 class="summary-sheet-title">${formatInlineText(title)}</h2>
            </div>
            <button class="summary-close" id="summary-close" type="button">접기</button>
          </div>
          <div class="summary-copy">
            ${paragraphs(summary.body).map(p => `<p>${formatInlineText(p)}</p>`).join('')}
          </div>
        </article>
      </div>
    `;

    const physics = $('summary-physics');
    const sheet = $('summary-sheet');
    const close = $('summary-close');
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    let openState = false;
    const engineLabs = [];
    function setOpen(next) {
      openState = next;
      physics.classList.toggle('open', next);
      physics.classList.remove('primed');
      sheet.setAttribute('aria-hidden', String(!next));
    }
    function toggleOpen() { setOpen(!openState); }
    physics.querySelectorAll('[data-design-engine]').forEach((card) => {
      const candidate = VISUAL_CANDIDATES.find((item) => item.id === card.dataset.designEngine);
      if (candidate) engineLabs.push(initVisualCandidateLab({ card, candidate, setOpen, toggleOpen, reduced }));
    });
    function tick(ms) {
      const time = ms / 1000;
      engineLabs.forEach((lab) => lab && lab.update && lab.update(time));
      requestAnimationFrame(tick);
    }
    function closeSummarySheet(e) {
      e.preventDefault();
      e.stopPropagation();
      setOpen(false);
    }
    close.addEventListener('pointerdown', closeSummarySheet);
    close.addEventListener('click', closeSummarySheet);
    requestAnimationFrame(tick);
  }

  let data;
  const inlineEl = document.getElementById('articles-data');
  const inlineRaw = inlineEl ? inlineEl.textContent.trim() : '';
  if (inlineRaw && !inlineRaw.startsWith('__')) {
    try { data = JSON.parse(inlineRaw); }
    catch (e) {
      $('center').innerHTML = `<div class="error">인라인 파싱 실패 · ${esc(e.message)}</div>`; return;
    }
  } else {
    try {
      const res = await fetch('articles.json?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      data = await res.json();
    } catch (e) {
      $('center').innerHTML = `<div class="error">기사를 불러오지 못했습니다 · ${esc(e.message)}</div>`; return;
    }
  }

  const all = data.articles || [];
  const gen = data.generated_at;
  $('topbar-date').textContent = fmtTime(gen);
  $('masthead-date').textContent = fmtDate(gen, { weekday: true });
  $('masthead-source').textContent = `${all.length} STORIES · UPDATED ${fmtTime(gen)}`;
  $('footer-meta').textContent = `GENERATED ${fmtTime(gen)}`;
  renderDailyRibbon(data.daily_summary);

  if (!all.length) {
    $('center').innerHTML = `<div class="empty">표시할 기사가 없습니다.</div>`;
    return;
  }

  const byPlacement = (p) => all.filter(a => a.placement === p)
    .sort((a,b) => (b.placed_at || '').localeCompare(a.placed_at || ''));
  const top = byPlacement('top');
  const main = byPlacement('main');
  const side = byPlacement('side');

  // Tag badge renderer
  function tagBadges(a) {
    const cat = a.category || '';
    const trust = a.trust || '';
    let out = '';
    if (cat === 'rumor') out += '<span class="tag rumor">찌라시</span>';
    if (trust === 'low') out += '<span class="tag trust-low">낮은 신뢰</span>';
    return out;
  }

  // ── Center render ──
  let html = '';
  if (top[0]) {
    const t = top[0];
    html += `
      <div class="section-label"><span>TOP STORY</span></div>
      <article class="hero" data-id="${esc(t.id)}">
        <div class="kicker">LEAD ${tagBadges(t)}</div>
        <h2>${formatInlineText(t.headline)}</h2>
        <p class="lede">${formatInlineText(excerpt(t.body, 240))}</p>
        <div class="read-more">Read the full story</div>
      </article>
    `;
  }
  if (main.length) {
    html += `<div class="section-label"><span>MAIN · ${main.length}/6</span></div><div class="grid">`;
    main.forEach((a, i) => {
      html += `
        <article class="card" data-id="${esc(a.id)}">
          <div class="num">No. ${String(i + 1).padStart(2, '0')} ${tagBadges(a)}</div>
          <h3>${formatInlineText(a.headline)}</h3>
          <p>${formatInlineText(excerpt(a.body, 180))}</p>
        </article>
      `;
    });
    html += `</div>`;
  }
  if (!top.length && !main.length) {
    html += `<div class="empty">메인 기사 없음. 사이드 또는 더보기를 확인하세요.</div>`;
  }
  $('center').innerHTML = html;

  // ── Sides render (split 3-way: left, center-extra, right) ──
  function sideCard(a, n, withSnip) {
    const snip = withSnip ? `<div class="snip">${formatInlineText(excerpt(a.body, 120))}</div>` : '';
    return `
      <div class="side-item" data-id="${esc(a.id)}">
        <div class="num">No. ${String(n).padStart(2, '0')} ${tagBadges(a)}</div>
        <div class="t">${formatInlineText(a.headline)}</div>
        ${snip}
      </div>
    `;
  }
  // 3-way split: i%3 — 0→left, 1→center-extra, 2→right
  const leftItems = side.filter((_, i) => i % 3 === 0);
  const centerExtraItems = side.filter((_, i) => i % 3 === 1);
  const rightItems = side.filter((_, i) => i % 3 === 2);

  $('side-left').innerHTML = leftItems
    .map((a, i) => sideCard(a, i * 3 + 1, true)).join('');
  $('side-right').innerHTML = rightItems
    .map((a, i) => sideCard(a, i * 3 + 3, true)).join('');

  // Center extra: append to main content as a second grid of side items
  if (centerExtraItems.length) {
    const extraHtml = `
      <div class="section-label"><span>MORE</span></div>
      <div class="more-list">
        ${centerExtraItems.map((a, i) => sideCard(a, i * 3 + 2, true)).join('')}
      </div>
    `;
    $('center').insertAdjacentHTML('beforeend', extraHtml);
  }

  // ── Reader modal ──
  const byId = Object.fromEntries(all.map(a => [a.id, a]));
  const reader = $('reader');
  function openReader(id) {
    const a = byId[id];
    if (!a) return;
    $('reader-title').innerHTML = formatInlineText(a.headline);
    $('reader-byline').textContent = `FIRST LIGHT AI · ${fmtDate(a.placed_at || gen)}`;
    $('reader-body').innerHTML = paragraphs(a.body).map(p => `<p>${formatInlineText(p)}</p>`).join('');
    reader.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeReader() {
    reader.classList.remove('open');
    document.body.style.overflow = '';
  }
  $('reader-close').addEventListener('click', closeReader);
  reader.addEventListener('click', (e) => { if (e.target === reader) closeReader(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeReader(); });
  document.querySelectorAll('[data-id]').forEach(el => {
    el.addEventListener('click', () => openReader(el.dataset.id));
  });
})();
</script>
</body>
</html>
