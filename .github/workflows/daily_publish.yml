name: Daily Signal AI Publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (미리보기만)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      platform:
        description: '발행 플랫폼'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - telegram
          - x
      force:
        description: '강제 재발행'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate articles
        run: python scripts/validate_articles.py

      - name: Run publish
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          ARGS="--platform ${{ github.event.inputs.platform || 'both' }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          python scripts/run_publish.py $ARGS

      - name: Commit published state
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/published.json
          git diff --staged --quiet || git commit -m "chore: 발행 상태 업데이트 [skip ci]"
          git push
