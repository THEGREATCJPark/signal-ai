<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="AI 커뮤니티의 첫 빛을 추적합니다."/>
<title>First Light AI — 데일리 브리핑</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --paper: #faf8f3;
    --paper-alt: #f3f0e7;
    --ink: #141414;
    --ink-2: #2b2b2b;
    --ink-3: #5a5a5a;
    --ink-4: #8a8a8a;
    --rule: #1a1a1a;
    --rule-soft: #d9d5c7;
    --accent: #b91c1c;
    --accent-soft: #fef2f2;
    --serif: 'Noto Serif KR', 'Times New Roman', serif;
    --sans: 'Noto Sans KR', -apple-system, 'Segoe UI', sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
  }

  /* ── Topbar ── */
  .topbar {
    border-bottom: 1px solid var(--rule-soft);
    background: var(--paper);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--ink-3);
  }
  .topbar-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 24px;
    max-width: 1320px;
    margin: 0 auto;
    text-transform: uppercase;
  }
  .topbar .pulse {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); margin-right: 6px; vertical-align: middle;
    animation: pulse 2s infinite;
  }
  .topbar-right {
    display: inline-flex; align-items: center; gap: 14px;
  }
  .topbar-link {
    color: var(--accent); text-decoration: none;
    font-weight: 600; letter-spacing: 0.12em;
    padding: 3px 8px; border: 1px solid var(--accent);
    border-radius: 2px;
    transition: all .15s;
  }
  .topbar-link:hover {
    background: var(--accent); color: var(--paper);
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Masthead ── */
  .masthead {
    position: relative;
    overflow: visible;
    text-align: center;
    padding: 48px 24px 28px;
    border-bottom: 3px double var(--rule);
    max-width: 1320px;
    margin: 0 auto;
  }
	  .masthead h1 {
	    font-family: var(--serif);
	    font-weight: 900;
	    font-size: 5rem;
	    letter-spacing: -0.02em;
	    line-height: 0.9;
	    color: var(--ink);
	  }
	  @media (max-width: 720px) {
	    .masthead h1 { font-size: 2.6rem; }
	  }
  .masthead .tagline {
    font-family: var(--serif);
    font-style: italic;
    font-size: 1.05rem;
    color: var(--ink-3);
    margin-top: 14px;
    font-weight: 400;
  }
  .masthead .meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-4);
    margin-top: 18px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .masthead .meta .dot { margin: 0 10px; opacity: 0.5; }

  /* ── Layout: sides + center ── */
  .layout {
    max-width: 1560px;
    margin: 0 auto;
    padding: 32px 24px 0;
    display: grid;
    grid-template-columns: 300px minmax(0, 820px) 300px;
    gap: 44px;
    justify-content: center;
    align-items: start;
  }
  @media (max-width: 1280px) {
    .layout {
      display: flex;
      flex-direction: column;
      grid-template-columns: 1fr;
      padding: 32px 18px 0;
      gap: 0;
    }
    .center { order: 1; }
    .side-left { order: 2; margin-top: 40px; }
    .side-right { order: 3; margin-top: 0; }
  }

  /* ── Side columns (larger, no labels) ── */
  .side { }
  @media (max-width: 1280px) {
    .side { position: static; }
  }
  .side-item {
    padding: 18px 0;
    border-bottom: 1px solid var(--rule-soft);
    cursor: pointer;
    transition: opacity .15s;
  }
  .side-item:first-child { padding-top: 4px; }
  .side-item:hover { opacity: 0.65; }
  .side-item:last-child { border-bottom: none; }
  .side-item .num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-4);
    letter-spacing: 0.12em;
    margin-bottom: 6px;
  }
  .side-item .t {
    font-family: var(--serif);
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.35;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .side-item .snip {
    font-size: 0.82rem;
    line-height: 1.55;
    color: var(--ink-3);
    margin-top: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Section heading (center) ── */
  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 40px 0 24px;
  }
  .section-label:first-child { margin-top: 0; }
  .section-label::before, .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--rule-soft);
  }

  /* ── Tag badges ── */
  .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 2px;
    margin-right: 4px;
    vertical-align: middle;
  }
  .tag.rumor { background: #f97316; color: white; }
  .tag.news { display: none; }  /* news는 기본이라 표시 안 함 */
  .tag.trust-low { background: transparent; color: var(--ink-4); border: 1px solid var(--rule-soft); }
  .tag.trust-high { display: none; }  /* high는 기본 표시 안 함 */

  /* ── Hero (TOP) ── */
  .hero {
    padding: 4px 0 40px;
    cursor: pointer;
    transition: opacity .2s;
  }
  .hero:hover { opacity: 0.88; }
  .hero .kicker {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .hero h2 {
    font-family: var(--serif);
    font-size: clamp(1.8rem, 4.5vw, 2.8rem);
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 18px;
  }
  .hero .lede {
    font-family: var(--serif);
    font-size: 1.12rem;
    line-height: 1.7;
    color: var(--ink-2);
  }
  .hero .read-more {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 22px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .hero .read-more::after { content: '→'; transition: transform .2s; }
  .hero:hover .read-more::after { transform: translateX(4px); }

  /* ── Daily pull-ribbon ── */
  .daily-ribbon-stage {
    position: absolute;
    top: 56px;
    right: 20px;
    width: 76px;
    height: 312px;
    margin: 0;
    padding: 0;
    z-index: 60;
    pointer-events: none;
  }
  .daily-ribbon-stage[hidden] { display: none; }
  .summary-physics {
    position: relative;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .summary-physics.open {}
  .summary-strings {
    position: absolute;
    top: 0;
    right: 0;
    width: 100%;
    height: 222px;
    pointer-events: none;
    overflow: visible;
  }
  .summary-string {
    fill: none;
    stroke: rgba(20,20,20,.68);
    stroke-width: 1.15;
    stroke-linecap: round;
    filter: drop-shadow(0 1px 0 rgba(255,255,255,.55));
  }
  .summary-string.shadow {
    stroke: rgba(185,28,28,.28);
    stroke-width: .7;
    stroke-dasharray: 2 6;
  }
  .summary-bead {
    fill: var(--paper);
    stroke: var(--rule);
    stroke-width: 1;
  }
  .summary-ribbon-pull {
    --ribbon-x: 0px;
    --ribbon-y: 26px;
    --ribbon-tilt: 0deg;
    --ribbon-fold-x: 0deg;
    --ribbon-fold-y: 0deg;
    position: absolute;
    left: 50%;
    top: 0;
    width: 46px;
    min-height: 178px;
    padding: 0;
    border: 1px solid var(--rule);
    border-radius: 6px;
    background:
      linear-gradient(115deg, rgba(255,255,255,.58) 0 14%, transparent 14% 34%, rgba(20,20,20,.08) 34% 38%, transparent 38% 64%, rgba(255,255,255,.36) 64% 76%, rgba(20,20,20,.07) 76% 82%, transparent 82%),
      linear-gradient(180deg, rgba(185,28,28,.14), transparent 20%, rgba(20,20,20,.05) 50%, transparent 82%, rgba(185,28,28,.18)),
      repeating-linear-gradient(180deg, rgba(20,20,20,.035) 0 1px, transparent 1px 7px),
      var(--paper);
    color: var(--ink);
    box-shadow: 0 18px 34px rgba(20,20,20,.12), inset 0 1px 0 rgba(255,255,255,.75);
    cursor: grab;
    touch-action: none;
    user-select: none;
    pointer-events: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    transform-style: preserve-3d;
    transform: perspective(760px) translate(calc(-50% + var(--ribbon-x)), var(--ribbon-y)) rotate(var(--ribbon-tilt)) rotateX(var(--ribbon-fold-x)) rotateY(var(--ribbon-fold-y));
    transform-origin: 50% -40px;
    z-index: 62;
  }
  .summary-ribbon-pull:active { cursor: grabbing; }
  .summary-ribbon-pull::before,
  .summary-ribbon-pull::after {
    content: '';
    position: absolute;
  }
  .summary-ribbon-pull::before {
    inset: 12px 9px 38px;
    border-left: 1px solid rgba(20,20,20,.22);
    border-right: 1px solid rgba(20,20,20,.22);
    background:
      radial-gradient(ellipse at 30% 18%, rgba(255,255,255,.46), transparent 34%),
      linear-gradient(90deg, rgba(20,20,20,.08), transparent 18%, rgba(255,255,255,.18) 42%, rgba(20,20,20,.07) 72%, transparent);
    transform: translateZ(1px);
  }
  .summary-ribbon-pull::after {
    left: 10px;
    right: 10px;
    bottom: 16px;
    height: 1px;
    border-top: 1px solid rgba(20,20,20,.28);
  }
  .ribbon-title {
    position: absolute;
    width: 1px;
    height: 1px;
    overflow: hidden;
    clip-path: inset(50%);
    white-space: nowrap;
  }
  .ribbon-line {
    display: block;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-family: var(--mono);
    font-size: .78rem;
    font-weight: 800;
    letter-spacing: .14em;
    line-height: 1;
    color: var(--ink);
    margin: 16px 0 22px;
    position: relative;
    z-index: 1;
  }
  .ribbon-meta { display: none; }
  .ribbon-handle {
    position: absolute;
    left: 50%;
    bottom: -26px;
    width: 46px;
    height: 26px;
    transform: translateX(-50%);
    border: 1px solid var(--rule);
    border-top: none;
    border-radius: 0 0 6px 6px;
    background: var(--ink);
    color: var(--paper);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: .14em;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 12px 18px rgba(20,20,20,.14);
  }
  .summary-physics.primed .ribbon-handle { background: var(--accent); }
  .summary-sheet {
    position: fixed;
    top: 128px;
    right: 96px;
    width: min(560px, calc(100vw - 132px));
    max-height: calc(100vh - 152px);
    margin: 0;
    padding: 0 28px;
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: color-mix(in srgb, var(--paper) 96%, white);
    box-shadow: 0 24px 70px rgba(20,20,20,.18);
    opacity: 0;
    overflow: auto;
    pointer-events: none;
    transform: translateX(18px) translateY(-8px);
    z-index: 88;
    transition:
      opacity .28s ease,
      transform .55s cubic-bezier(.18,.72,.18,1),
      padding .55s cubic-bezier(.18,.72,.18,1);
  }
  .summary-physics.open .summary-sheet {
    opacity: 1;
    padding: 28px;
    pointer-events: auto;
    transform: translateX(0) translateY(0);
  }
  .summary-sheet-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--rule-soft);
    margin-bottom: 24px;
  }
  .summary-sheet-kicker {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .summary-sheet-title {
    font-family: var(--serif);
    font-size: clamp(1.55rem, 3.2vw, 2.2rem);
    line-height: 1.12;
    font-weight: 900;
    letter-spacing: 0;
    word-break: keep-all;
    overflow-wrap: break-word;
    text-wrap: balance;
  }
  .summary-close {
    flex: 0 0 auto;
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: transparent;
    color: var(--ink);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    padding: 9px 12px;
    cursor: pointer;
  }
  .summary-close:hover { background: var(--ink); color: var(--paper); }
  .summary-copy p {
    font-family: var(--serif);
    font-size: clamp(1.02rem, 2vw, 1.13rem);
    line-height: 1.9;
    color: var(--ink-2);
    margin-bottom: 18px;
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  .summary-copy p:last-child { margin-bottom: 0; }
  .summary-copy p:first-of-type::first-letter {
    font-size: 3.2rem;
    line-height: .9;
    float: left;
    font-weight: 900;
    color: var(--accent);
    margin: 8px 10px 0 0;
  }
  @media (max-width: 720px) {
    .daily-ribbon-stage {
      top: 84px;
      right: -6px;
      width: 56px;
      height: 242px;
    }
    .summary-strings {
      height: 178px;
    }
    .summary-ribbon-pull {
      width: 38px;
      min-height: 144px;
    }
    .ribbon-line {
      font-size: .7rem;
      margin-bottom: 18px;
    }
    .ribbon-handle {
      width: 38px;
      height: 24px;
      bottom: -24px;
    }
    .summary-sheet {
      top: max(8px, env(safe-area-inset-top));
      right: 8px;
      left: 8px;
      width: auto;
      max-height: calc(100vh - max(8px, env(safe-area-inset-top)) - 48px);
      max-height: calc(100dvh - max(8px, env(safe-area-inset-top)) - max(48px, env(safe-area-inset-bottom)));
      padding: 0 18px;
      border-radius: 6px;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    .summary-physics.open .summary-sheet {
      padding: 18px 18px max(56px, calc(34px + env(safe-area-inset-bottom)));
    }
    .summary-sheet-head {
      display: block;
    }
    .summary-close {
      margin-top: 16px;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .summary-ribbon-pull,
    .summary-sheet,
    .summary-physics {
      transition: none;
    }
  }

  /* ── MAIN grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0;
  }
  @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
  .card {
    padding: 28px 24px;
    border-right: 1px solid var(--rule-soft);
    border-bottom: 1px solid var(--rule-soft);
    cursor: pointer;
    transition: background .2s;
  }
  .card:hover { background: var(--paper-alt); }
  .card:nth-child(2n) { border-right: none; }
  @media (max-width: 640px) {
    .card { border-right: none; padding: 24px 4px; }
  }
  .card .num {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-4);
    letter-spacing: 0.15em;
    margin-bottom: 10px;
  }
  .card h3 {
    font-family: var(--serif);
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 10px;
  }
  .card p {
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--ink-3);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── More button ── */
  .more-wrap {
    text-align: center;
    padding: 56px 24px 24px;
  }
  .more-btn {
    display: inline-block;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    padding: 14px 32px;
    border: 1px solid var(--ink);
    background: var(--paper);
    transition: all .2s;
  }
  .more-btn:hover { background: var(--ink); color: var(--paper); }

  /* ── Modal reader ── */
  .reader {
    position: fixed; inset: 0;
    background: rgba(20, 20, 20, 0.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: flex-start;
    justify-content: center;
    z-index: 100;
    padding: 40px 20px;
    overflow-y: auto;
  }
  .reader.open { display: flex; animation: fadein .25s ease; }
  @keyframes fadein { from{opacity:0} to{opacity:1} }
  .reader-panel {
    background: var(--paper);
    max-width: 760px; width: 100%;
    padding: 56px 56px 64px;
    border: 1px solid var(--rule-soft);
    box-shadow: 0 30px 80px rgba(0,0,0,0.25);
    position: relative;
  }
  @media (max-width: 600px) {
    .reader-panel { padding: 40px 24px 48px; }
  }
  .reader-close {
    position: absolute; top: 18px; right: 22px;
    background: none; border: none;
    font-size: 28px; color: var(--ink-3);
    cursor: pointer; line-height: 1;
    padding: 6px 10px; font-family: var(--serif);
  }
  .reader-close:hover { color: var(--ink); }
  .reader .kicker {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
  }
  .reader h2 {
    font-family: var(--serif);
    font-size: clamp(1.7rem, 4vw, 2.4rem);
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 20px;
  }
  .reader .byline {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-4);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--rule-soft);
    margin-bottom: 28px;
  }
  .reader .body {
    font-family: var(--serif);
    font-size: 1.08rem;
    line-height: 1.85;
    color: var(--ink-2);
  }
  .reader .body p {
    margin-bottom: 18px;
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  .reader .body p:first-of-type::first-letter {
    font-size: 3.6rem;
    font-weight: 700;
    float: left;
    line-height: 0.9;
    margin: 6px 10px 0 0;
    color: var(--accent);
    font-family: var(--serif);
  }

  /* ── Footer ── */
  .footer {
    border-top: 3px double var(--rule);
    margin-top: 40px;
    padding: 40px 24px 60px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-4);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 2;
    max-width: 1320px;
    margin-left: auto;
    margin-right: auto;
  }
  .footer strong { color: var(--ink-2); font-weight: 600; }

  .loading, .error, .empty {
    text-align: center;
    padding: 60px 20px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-4);
    letter-spacing: 0.1em;
  }
  .error { color: var(--accent); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <span><span class="pulse"></span>LIVE · FIRST LIGHT AI</span>
    <span class="topbar-right">
      <span id="topbar-date">—</span>
      <a href="archive.html" id="archive-link-top" class="topbar-link">ARCHIVE →</a>
    </span>
  </div>
</div>

<header class="masthead">
  <h1>FIRST LIGHT AI</h1>
  <div class="tagline">The frontier in your feed.</div>
  <div class="meta">
    <span id="masthead-date">—</span>
    <span class="dot">·</span>
    <span id="masthead-source">—</span>
    <span class="dot">·</span>
    <span>VOL. 001</span>
  </div>
  <section class="daily-ribbon-stage" id="daily-summary-stage" hidden></section>
</header>

<div class="layout">
  <aside class="side side-left" id="side-left"></aside>
  <main class="center" id="center">
    <div class="loading">Loading first light…</div>
  </main>
  <aside class="side side-right" id="side-right"></aside>
</div>

<div class="more-wrap">
  <a href="archive.html" id="archive-link-bottom" class="more-btn">더보기 →</a>
</div>

<div class="reader" id="reader" role="dialog" aria-modal="true">
  <div class="reader-panel">
    <button class="reader-close" id="reader-close" aria-label="Close">×</button>
    <div class="kicker">FIRST LIGHT AI · FEATURE</div>
    <h2 id="reader-title"></h2>
    <div class="byline" id="reader-byline"></div>
    <div class="body" id="reader-body"></div>
  </div>
</div>

<footer class="footer">
  <div><strong>First Light AI</strong> · AI community intelligence</div>
  <div id="footer-meta">—</div>
</footer>

<script id="articles-data" type="application/json">__ARTICLES_JSON__</script>
<script>
(async function() {
  const $ = (id) => document.getElementById(id);

  // htmlpreview wraps the page — relative links break out of the wrapper.
  // Detect and rewrite archive link to go through htmlpreview too.
  (function fixArchiveLinks() {
    const here = window.location.href;
    const isPreview = here.includes('htmlpreview.github.io');
    if (!isPreview) return;
    // figure out the base gist raw URL from query string
    const q = window.location.search.slice(1) + window.location.hash.slice(1);
    const raw = q.startsWith('http') ? q : '';
    if (!raw) return;
    const archiveRaw = raw.replace(/index\.html(\?.*)?$/, 'archive.html');
    const wrapped = 'https://htmlpreview.github.io/?' + archiveRaw;
    const top = document.getElementById('archive-link-top');
    const bot = document.getElementById('archive-link-bottom');
    if (top) top.href = wrapped;
    if (bot) bot.href = wrapped;
  })();

  function fmtDate(iso, opts = {}) {
    try {
      const d = new Date(iso);
      return d.toLocaleDateString('ko-KR', {
        year: 'numeric', month: 'long', day: 'numeric',
        weekday: opts.weekday ? 'long' : undefined
      });
    } catch { return iso; }
  }
  function fmtTime(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleString('ko-KR', {
        month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    } catch { return iso; }
  }
  function esc(s) {
    return String(s || '').replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }
  function formatInlineText(s) {
    return esc(s).replace(/([A-Za-z0-9])\/([A-Za-z0-9])/g, '$1&#8288;/&#8288;$2');
  }
  function excerpt(s, n = 160) {
    const clean = String(s).replace(/^\*+\s*/, '').replace(/\*\*/g, '').split('\n')[0];
    return clean.length > n ? clean.slice(0, n).trim() + '…' : clean;
  }
  function paragraphs(body) {
    return String(body).replace(/\*\*/g, '').split(/\n{2,}|\n/).map(p => p.trim()).filter(Boolean);
  }
  function clamp(n, min, max) {
    return Math.max(min, Math.min(max, n));
  }
  function renderDailyRibbon(summary) {
    const stage = $('daily-summary-stage');
    if (!stage || !summary || !summary.body) return;
    const title = summary.title || "오늘의 AI 업데이트";
    stage.hidden = false;
    stage.innerHTML = `
      <div class="summary-physics" id="summary-physics">
        <svg class="summary-strings" id="summary-strings" aria-hidden="true">
          <path class="summary-string shadow" data-cord="0"></path>
          <path class="summary-string" data-cord="0"></path>
          <path class="summary-string shadow" data-cord="1"></path>
          <path class="summary-string" data-cord="1"></path>
          <path class="summary-string shadow" data-cord="2"></path>
          <path class="summary-string" data-cord="2"></path>
          <circle class="summary-bead" data-bead="0" r="4"></circle>
          <circle class="summary-bead" data-bead="1" r="4"></circle>
          <circle class="summary-bead" data-bead="2" r="4"></circle>
        </svg>
        <button class="summary-ribbon-pull" id="summary-ribbon-pull" type="button" aria-expanded="false" aria-controls="summary-sheet" aria-label="Don't Die. 요약 열기">
          <span class="ribbon-title">${esc(title)}</span>
          <span class="ribbon-line">Don't Die.</span>
          <span class="ribbon-meta" aria-hidden="true"></span>
          <span class="ribbon-handle">PULL</span>
        </button>
        <article class="summary-sheet" id="summary-sheet" aria-hidden="true">
          <div class="summary-sheet-head">
            <div>
              <div class="summary-sheet-kicker">Don't Die. · ${esc(summary.date || '')}</div>
              <h2 class="summary-sheet-title">${formatInlineText(title)}</h2>
            </div>
            <button class="summary-close" id="summary-close" type="button">접기</button>
          </div>
          <div class="summary-copy">
            ${paragraphs(summary.body).map(p => `<p>${formatInlineText(p)}</p>`).join('')}
          </div>
        </article>
      </div>
    `;

    const physics = $('summary-physics');
    const ribbon = $('summary-ribbon-pull');
    const sheet = $('summary-sheet');
    const close = $('summary-close');
    const svg = $('summary-strings');
    const cords = [...svg.querySelectorAll('[data-cord]')];
    const beads = [...svg.querySelectorAll('[data-bead]')];
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const state = {
      x: 0, y: 26, vx: 0, vy: 0,
      targetX: 0, targetY: 26,
      dragging: false,
      swinging: false,
      swingAngle: 0,
      swingVelocity: 0,
      open: false,
      startX: 0, startY: 0,
      lastX: 0, lastY: 0,
      baseX: 0, baseY: 0,
      dragDistance: 0,
    };
    const collapsedY = 26;
    const openY = 78;
    const pullLimit = 138;
    const toggleThreshold = 116;

    function setOpen(next) {
      state.open = next;
      state.targetY = next ? openY : collapsedY;
      physics.classList.toggle('open', next);
      physics.classList.remove('primed');
      ribbon.setAttribute('aria-expanded', String(next));
      sheet.setAttribute('aria-hidden', String(!next));
    }
    function draw() {
      const width = Math.max(54, physics.clientWidth);
      svg.setAttribute('viewBox', `0 0 ${width} 220`);
      const anchors = [width * .28, width * .5, width * .72];
      const offsets = [-18, 0, 18].map(v => clamp(v, -width * .3, width * .3));
      const ribbonTop = 6 + state.y;
      const ribbonY = ribbonTop + 12;
      cords.forEach((path, i) => {
        const idx = Number(path.dataset.cord);
        const ax = anchors[idx];
        const tx = width * .5 + offsets[idx] + state.x;
        const midY = 16 + state.y * .52;
        const sway = state.x * (idx - 1) * .18;
        const d = `M ${ax} 0 C ${ax + sway} ${midY * .34}, ${tx - sway} ${midY}, ${tx} ${ribbonY}`;
        path.setAttribute('d', d);
      });
      beads.forEach((bead) => {
        const idx = Number(bead.dataset.bead);
        bead.setAttribute('cx', String(width * .5 + offsets[idx] + state.x));
        bead.setAttribute('cy', String(ribbonY));
      });
      ribbon.style.setProperty('--ribbon-x', `${state.x.toFixed(2)}px`);
      ribbon.style.setProperty('--ribbon-y', `${state.y.toFixed(2)}px`);
      ribbon.style.setProperty('--ribbon-tilt', `${clamp(state.x * .08 + state.vx * .18, -12, 12).toFixed(2)}deg`);
      ribbon.style.setProperty('--ribbon-fold-x', `${clamp(state.y * .04 - 3, -3, 5).toFixed(2)}deg`);
      ribbon.style.setProperty('--ribbon-fold-y', `${clamp(-state.x * .12, -8, 8).toFixed(2)}deg`);
    }
    function startPendulum(impulse) {
      if (reduced) return;
      state.swinging = true;
      state.swingAngle = clamp(state.x / 38, -1.15, 1.15);
      state.swingVelocity = clamp(impulse * .018, -0.24, 0.24);
    }
    function tick() {
      if (!state.dragging && !reduced) {
        state.vy += (state.targetY - state.y) * .115;
        state.vy *= .74;
        state.y += state.vy;
        if (state.swinging) {
          state.swingVelocity += -state.swingAngle * .045;
          state.swingVelocity *= .972;
          state.swingAngle += state.swingVelocity;
          const nextX = Math.sin(state.swingAngle) * 38;
          state.vx = nextX - state.x;
          state.x = nextX;
          if (Math.abs(state.swingVelocity) < .0025 && Math.abs(state.swingAngle) < .018) {
            state.swinging = false;
            state.targetX = 0;
          }
        } else {
          state.vx += (state.targetX - state.x) * .09;
          state.vx *= .76;
          state.x += state.vx;
        }
      } else if (reduced) {
        state.y = state.targetY;
        state.x = state.targetX;
      }
      draw();
      requestAnimationFrame(tick);
    }

    ribbon.addEventListener('pointerdown', (e) => {
      state.dragging = true;
      state.startX = e.clientX;
      state.startY = e.clientY;
      state.lastX = e.clientX;
      state.lastY = e.clientY;
      state.baseX = state.x;
      state.baseY = state.y;
      state.dragDistance = 0;
      state.swinging = false;
      ribbon.setPointerCapture(e.pointerId);
    });
    ribbon.addEventListener('pointermove', (e) => {
      if (!state.dragging) return;
      const dx = e.clientX - state.startX;
      const dy = e.clientY - state.startY;
      state.dragDistance = Math.max(state.dragDistance, Math.hypot(dx, dy));
      state.x = clamp(state.baseX + dx * .58, -42, 42);
      state.y = clamp(state.baseY + dy, 8, pullLimit);
      state.vx = e.clientX - state.lastX;
      state.vy = e.clientY - state.lastY;
      state.lastX = e.clientX;
      state.lastY = e.clientY;
      physics.classList.toggle('primed', state.y > toggleThreshold);
      draw();
    });
    function endDrag(e) {
      if (!state.dragging) return;
      state.dragging = false;
      if (ribbon.hasPointerCapture(e.pointerId)) ribbon.releasePointerCapture(e.pointerId);
      const shouldToggle = state.y > toggleThreshold;
      if (shouldToggle) setOpen(!state.open);
      else setOpen(state.open);
      startPendulum(state.vx);
    }
    ribbon.addEventListener('pointerup', endDrag);
    ribbon.addEventListener('pointercancel', endDrag);
    ribbon.addEventListener('click', () => {
      if (state.dragDistance > 6) return;
      setOpen(!state.open);
    });
    function closeSummarySheet(e) {
      e.preventDefault();
      e.stopPropagation();
      setOpen(false);
    }
    close.addEventListener('pointerdown', closeSummarySheet);
    close.addEventListener('click', closeSummarySheet);
    window.addEventListener('resize', draw);
    draw();
    requestAnimationFrame(tick);
  }

  let data;
  const inlineEl = document.getElementById('articles-data');
  const inlineRaw = inlineEl ? inlineEl.textContent.trim() : '';
  if (inlineRaw && !inlineRaw.startsWith('__')) {
    try { data = JSON.parse(inlineRaw); }
    catch (e) {
      $('center').innerHTML = `<div class="error">인라인 파싱 실패 · ${esc(e.message)}</div>`; return;
    }
  } else {
    try {
      const res = await fetch('articles.json?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      data = await res.json();
    } catch (e) {
      $('center').innerHTML = `<div class="error">기사를 불러오지 못했습니다 · ${esc(e.message)}</div>`; return;
    }
  }

  const all = data.articles || [];
  const gen = data.generated_at;
  $('topbar-date').textContent = fmtTime(gen);
  $('masthead-date').textContent = fmtDate(gen, { weekday: true });
  $('masthead-source').textContent = `${all.length} STORIES · UPDATED ${fmtTime(gen)}`;
  $('footer-meta').textContent = `GENERATED ${fmtTime(gen)}`;
  renderDailyRibbon(data.daily_summary);

  if (!all.length) {
    $('center').innerHTML = `<div class="empty">표시할 기사가 없습니다.</div>`;
    return;
  }

  const byPlacement = (p) => all.filter(a => a.placement === p)
    .sort((a,b) => (b.placed_at || '').localeCompare(a.placed_at || ''));
  const top = byPlacement('top');
  const main = byPlacement('main');
  const side = byPlacement('side');

  // Tag badge renderer
  function tagBadges(a) {
    const cat = a.category || '';
    const trust = a.trust || '';
    let out = '';
    if (cat === 'rumor') out += '<span class="tag rumor">찌라시</span>';
    if (trust === 'low') out += '<span class="tag trust-low">낮은 신뢰</span>';
    return out;
  }

  // ── Center render ──
  let html = '';
  if (top[0]) {
    const t = top[0];
    html += `
      <div class="section-label"><span>TOP STORY</span></div>
      <article class="hero" data-id="${esc(t.id)}">
        <div class="kicker">LEAD ${tagBadges(t)}</div>
        <h2>${formatInlineText(t.headline)}</h2>
        <p class="lede">${formatInlineText(excerpt(t.body, 240))}</p>
        <div class="read-more">Read the full story</div>
      </article>
    `;
  }
  if (main.length) {
    html += `<div class="section-label"><span>MAIN · ${main.length}/6</span></div><div class="grid">`;
    main.forEach((a, i) => {
      html += `
        <article class="card" data-id="${esc(a.id)}">
          <div class="num">No. ${String(i + 1).padStart(2, '0')} ${tagBadges(a)}</div>
          <h3>${formatInlineText(a.headline)}</h3>
          <p>${formatInlineText(excerpt(a.body, 180))}</p>
        </article>
      `;
    });
    html += `</div>`;
  }
  if (!top.length && !main.length) {
    html += `<div class="empty">메인 기사 없음. 사이드 또는 더보기를 확인하세요.</div>`;
  }
  $('center').innerHTML = html;

  // ── Sides render (split 3-way: left, center-extra, right) ──
  function sideCard(a, n, withSnip) {
    const snip = withSnip ? `<div class="snip">${formatInlineText(excerpt(a.body, 120))}</div>` : '';
    return `
      <div class="side-item" data-id="${esc(a.id)}">
        <div class="num">No. ${String(n).padStart(2, '0')} ${tagBadges(a)}</div>
        <div class="t">${formatInlineText(a.headline)}</div>
        ${snip}
      </div>
    `;
  }
  // 3-way split: i%3 — 0→left, 1→center-extra, 2→right
  const leftItems = side.filter((_, i) => i % 3 === 0);
  const centerExtraItems = side.filter((_, i) => i % 3 === 1);
  const rightItems = side.filter((_, i) => i % 3 === 2);

  $('side-left').innerHTML = leftItems
    .map((a, i) => sideCard(a, i * 3 + 1, true)).join('');
  $('side-right').innerHTML = rightItems
    .map((a, i) => sideCard(a, i * 3 + 3, true)).join('');

  // Center extra: append to main content as a second grid of side items
  if (centerExtraItems.length) {
    const extraHtml = `
      <div class="section-label"><span>MORE</span></div>
      <div class="more-list">
        ${centerExtraItems.map((a, i) => sideCard(a, i * 3 + 2, true)).join('')}
      </div>
    `;
    $('center').insertAdjacentHTML('beforeend', extraHtml);
  }

  // ── Reader modal ──
  const byId = Object.fromEntries(all.map(a => [a.id, a]));
  const reader = $('reader');
  function openReader(id) {
    const a = byId[id];
    if (!a) return;
    $('reader-title').innerHTML = formatInlineText(a.headline);
    $('reader-byline').textContent = `FIRST LIGHT AI · ${fmtDate(a.placed_at || gen)}`;
    $('reader-body').innerHTML = paragraphs(a.body).map(p => `<p>${formatInlineText(p)}</p>`).join('');
    reader.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeReader() {
    reader.classList.remove('open');
    document.body.style.overflow = '';
  }
  $('reader-close').addEventListener('click', closeReader);
  reader.addEventListener('click', (e) => { if (e.target === reader) closeReader(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeReader(); });
  document.querySelectorAll('[data-id]').forEach(el => {
    el.addEventListener('click', () => openReader(el.dataset.id));
  });
})();
</script>
</body>
