name: First Light AI Pages

on:
  push:
    branches: [main]
    paths:
      - index.html
      - archive.html
      - articles.json
      - exports/articles/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: first-light-ai-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build static artifact
        run: |
          mkdir -p _site
          cp index.html archive.html articles.json .nojekyll _site/
          if [ -d exports ]; then cp -R exports _site/exports; fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
