<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="AI 커뮤니티의 시그널을 추적합니다."/>
<title>SIGNAL — AI 데일리 브리핑</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --paper: #faf8f3;
    --paper-alt: #f3f0e7;
    --ink: #141414;
    --ink-2: #2b2b2b;
    --ink-3: #5a5a5a;
    --ink-4: #8a8a8a;
    --rule: #1a1a1a;
    --rule-soft: #d9d5c7;
    --accent: #b91c1c;
    --accent-soft: #fef2f2;
    --serif: 'Noto Serif KR', 'Times New Roman', serif;
    --sans: 'Noto Sans KR', -apple-system, 'Segoe UI', sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
  }

  /* ── Topbar ── */
  .topbar {
    border-bottom: 1px solid var(--rule-soft);
    background: var(--paper);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--ink-3);
  }
  .topbar-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 24px;
    max-width: 1320px;
    margin: 0 auto;
    text-transform: uppercase;
  }
  .topbar .pulse {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); margin-right: 6px; vertical-align: middle;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Masthead ── */
  .masthead {
    text-align: center;
    padding: 48px 24px 28px;
    border-bottom: 3px double var(--rule);
    max-width: 1320px;
    margin: 0 auto;
  }
  .masthead h1 {
    font-family: var(--serif);
    font-weight: 900;
    font-size: clamp(3.2rem, 10vw, 6rem);
    letter-spacing: -0.04em;
    line-height: 0.9;
    color: var(--ink);
  }
  .masthead .tagline {
    font-family: var(--serif);
    font-style: italic;
    font-size: 1.05rem;
    color: var(--ink-3);
    margin-top: 14px;
    font-weight: 400;
  }
  .masthead .meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-4);
    margin-top: 18px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .masthead .meta .dot { margin: 0 10px; opacity: 0.5; }

  /* ── Layout: sides + center ── */
  .layout {
    max-width: 1320px;
    margin: 0 auto;
    padding: 32px 24px 0;
    display: grid;
    grid-template-columns: 220px minmax(0, 720px) 220px;
    gap: 36px;
    justify-content: center;
    align-items: start;
  }
  @media (max-width: 1120px) {
    .layout {
      grid-template-columns: 1fr;
      padding: 32px 18px 0;
      gap: 0;
    }
    .side-left, .side-right { margin-top: 40px; }
  }

  /* ── Side columns ── */
  .side {
    position: sticky;
    top: 20px;
  }
  @media (max-width: 1120px) {
    .side { position: static; }
  }
  .side-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-4);
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule-soft);
    margin-bottom: 14px;
  }
  .side-item {
    padding: 14px 0;
    border-bottom: 1px solid var(--rule-soft);
    cursor: pointer;
    transition: opacity .15s;
  }
  .side-item:hover { opacity: 0.65; }
  .side-item:last-child { border-bottom: none; }
  .side-item .num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-4);
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .side-item .t {
    font-family: var(--serif);
    font-size: 0.92rem;
    font-weight: 600;
    line-height: 1.35;
    color: var(--ink);
  }

  /* ── Section heading (center) ── */
  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 40px 0 24px;
  }
  .section-label:first-child { margin-top: 0; }
  .section-label::before, .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--rule-soft);
  }

  /* ── Hero (TOP) ── */
  .hero {
    padding: 4px 0 40px;
    border-bottom: 1px solid var(--rule-soft);
    cursor: pointer;
    transition: opacity .2s;
  }
  .hero:hover { opacity: 0.88; }
  .hero .kicker {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .hero h2 {
    font-family: var(--serif);
    font-size: clamp(1.8rem, 4.5vw, 2.8rem);
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 18px;
  }
  .hero .lede {
    font-family: var(--serif);
    font-size: 1.12rem;
    line-height: 1.7;
    color: var(--ink-2);
  }
  .hero .read-more {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 22px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .hero .read-more::after { content: '→'; transition: transform .2s; }
  .hero:hover .read-more::after { transform: translateX(4px); }

  /* ── MAIN grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0;
    border-top: 1px solid var(--rule-soft);
  }
  @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
  .card {
    padding: 28px 24px;
    border-right: 1px solid var(--rule-soft);
    border-bottom: 1px solid var(--rule-soft);
    cursor: pointer;
    transition: background .2s;
  }
  .card:hover { background: var(--paper-alt); }
  .card:nth-child(2n) { border-right: none; }
  @media (max-width: 640px) {
    .card { border-right: none; padding: 24px 4px; }
  }
  .card .num {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-4);
    letter-spacing: 0.15em;
    margin-bottom: 10px;
  }
  .card h3 {
    font-family: var(--serif);
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 10px;
  }
  .card p {
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--ink-3);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── More button ── */
  .more-wrap {
    text-align: center;
    padding: 56px 24px 24px;
  }
  .more-btn {
    display: inline-block;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    padding: 14px 32px;
    border: 1px solid var(--ink);
    background: var(--paper);
    transition: all .2s;
  }
  .more-btn:hover { background: var(--ink); color: var(--paper); }

  /* ── Modal reader ── */
  .reader {
    position: fixed; inset: 0;
    background: rgba(20, 20, 20, 0.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: flex-start;
    justify-content: center;
    z-index: 100;
    padding: 40px 20px;
    overflow-y: auto;
  }
  .reader.open { display: flex; animation: fadein .25s ease; }
  @keyframes fadein { from{opacity:0} to{opacity:1} }
  .reader-panel {
    background: var(--paper);
    max-width: 760px; width: 100%;
    padding: 56px 56px 64px;
    border: 1px solid var(--rule-soft);
    box-shadow: 0 30px 80px rgba(0,0,0,0.25);
    position: relative;
  }
  @media (max-width: 600px) {
    .reader-panel { padding: 40px 24px 48px; }
  }
  .reader-close {
    position: absolute; top: 18px; right: 22px;
    background: none; border: none;
    font-size: 28px; color: var(--ink-3);
    cursor: pointer; line-height: 1;
    padding: 6px 10px; font-family: var(--serif);
  }
  .reader-close:hover { color: var(--ink); }
  .reader .kicker {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
  }
  .reader h2 {
    font-family: var(--serif);
    font-size: clamp(1.7rem, 4vw, 2.4rem);
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 20px;
  }
  .reader .byline {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-4);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--rule-soft);
    margin-bottom: 28px;
  }
  .reader .body {
    font-family: var(--serif);
    font-size: 1.08rem;
    line-height: 1.85;
    color: var(--ink-2);
  }
  .reader .body p { margin-bottom: 18px; }
  .reader .body p:first-of-type::first-letter {
    font-size: 3.6rem;
    font-weight: 700;
    float: left;
    line-height: 0.9;
    margin: 6px 10px 0 0;
    color: var(--accent);
    font-family: var(--serif);
  }

  /* ── Footer ── */
  .footer {
    border-top: 3px double var(--rule);
    margin-top: 40px;
    padding: 40px 24px 60px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-4);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 2;
    max-width: 1320px;
    margin-left: auto;
    margin-right: auto;
  }
  .footer strong { color: var(--ink-2); font-weight: 600; }

  .loading, .error, .empty {
    text-align: center;
    padding: 60px 20px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-4);
    letter-spacing: 0.1em;
  }
  .error { color: var(--accent); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <span><span class="pulse"></span>LIVE · SIGNAL</span>
    <span id="topbar-date">—</span>
  </div>
</div>

<header class="masthead">
  <h1>SIGNAL</h1>
  <div class="tagline">The frontier in your feed.</div>
  <div class="meta">
    <span id="masthead-date">—</span>
    <span class="dot">·</span>
    <span id="masthead-source">—</span>
    <span class="dot">·</span>
    <span>VOL. 001</span>
  </div>
</header>

<div class="layout">
  <aside class="side side-left" id="side-left"></aside>
  <main class="center" id="center">
    <div class="loading">Loading signal…</div>
  </main>
  <aside class="side side-right" id="side-right"></aside>
</div>

<div class="more-wrap">
  <a href="archive.html" class="more-btn">더보기 →</a>
</div>

<div class="reader" id="reader" role="dialog" aria-modal="true">
  <div class="reader-panel">
    <button class="reader-close" id="reader-close" aria-label="Close">×</button>
    <div class="kicker">SIGNAL · FEATURE</div>
    <h2 id="reader-title"></h2>
    <div class="byline" id="reader-byline"></div>
    <div class="body" id="reader-body"></div>
  </div>
</div>

<footer class="footer">
  <div><strong>SIGNAL</strong> · AI community intelligence</div>
  <div id="footer-meta">—</div>
</footer>

<script id="articles-data" type="application/json">__ARTICLES_JSON__</script>
<script>
(async function() {
  const $ = (id) => document.getElementById(id);

  function fmtDate(iso, opts = {}) {
    try {
      const d = new Date(iso);
      return d.toLocaleDateString('ko-KR', {
        year: 'numeric', month: 'long', day: 'numeric',
        weekday: opts.weekday ? 'long' : undefined
      });
    } catch { return iso; }
  }
  function fmtTime(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleString('ko-KR', {
        month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    } catch { return iso; }
  }
  function esc(s) {
    return String(s || '').replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }
  function excerpt(s, n = 160) {
    const clean = String(s).replace(/^\*+\s*/, '').replace(/\*\*/g, '').split('\n')[0];
    return clean.length > n ? clean.slice(0, n).trim() + '…' : clean;
  }
  function paragraphs(body) {
    return String(body).replace(/\*\*/g, '').split(/\n{2,}|\n/).map(p => p.trim()).filter(Boolean);
  }

  let data;
  const inlineEl = document.getElementById('articles-data');
  const inlineRaw = inlineEl ? inlineEl.textContent.trim() : '';
  if (inlineRaw && !inlineRaw.startsWith('__')) {
    try { data = JSON.parse(inlineRaw); }
    catch (e) {
      $('center').innerHTML = `<div class="error">인라인 파싱 실패 · ${esc(e.message)}</div>`; return;
    }
  } else {
    try {
      const res = await fetch('articles.json?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      data = await res.json();
    } catch (e) {
      $('center').innerHTML = `<div class="error">기사를 불러오지 못했습니다 · ${esc(e.message)}</div>`; return;
    }
  }

  const all = data.articles || [];
  const gen = data.generated_at;
  $('topbar-date').textContent = fmtTime(gen);
  $('masthead-date').textContent = fmtDate(gen, { weekday: true });
  $('masthead-source').textContent = `${all.length} STORIES · UPDATED ${fmtTime(gen)}`;
  $('footer-meta').textContent = `MODEL: ${(data.model || 'UNKNOWN').toUpperCase()} · GENERATED ${fmtTime(gen)}`;

  if (!all.length) {
    $('center').innerHTML = `<div class="empty">표시할 기사가 없습니다.</div>`;
    return;
  }

  const byPlacement = (p) => all.filter(a => a.placement === p)
    .sort((a,b) => (b.placed_at || '').localeCompare(a.placed_at || ''));
  const top = byPlacement('top');
  const main = byPlacement('main');
  const side = byPlacement('side');

  // ── Center render ──
  let html = '';
  if (top[0]) {
    const t = top[0];
    html += `
      <div class="section-label"><span>TOP STORY</span></div>
      <article class="hero" data-id="${esc(t.id)}">
        <div class="kicker">LEAD</div>
        <h2>${esc(t.headline)}</h2>
        <p class="lede">${esc(excerpt(t.body, 240))}</p>
        <div class="read-more">Read the full story</div>
      </article>
    `;
  }
  if (main.length) {
    html += `<div class="section-label"><span>MAIN · ${main.length}/6</span></div><div class="grid">`;
    main.forEach((a, i) => {
      html += `
        <article class="card" data-id="${esc(a.id)}">
          <div class="num">No. ${String(i + 1).padStart(2, '0')}</div>
          <h3>${esc(a.headline)}</h3>
          <p>${esc(excerpt(a.body, 180))}</p>
        </article>
      `;
    });
    html += `</div>`;
  }
  if (!top.length && !main.length) {
    html += `<div class="empty">메인 기사 없음. 사이드 또는 더보기를 확인하세요.</div>`;
  }
  $('center').innerHTML = html;

  // ── Sides render (split alternating) ──
  function sideCard(a, n) {
    return `
      <div class="side-item" data-id="${esc(a.id)}">
        <div class="num">No. ${String(n).padStart(2, '0')}</div>
        <div class="t">${esc(a.headline)}</div>
      </div>
    `;
  }
  const left = side.filter((_, i) => i % 2 === 0);
  const right = side.filter((_, i) => i % 2 === 1);
  $('side-left').innerHTML = (left.length
    ? `<div class="side-label">SIDE · A</div>${left.map((a, i) => sideCard(a, i * 2 + 1)).join('')}`
    : '');
  $('side-right').innerHTML = (right.length
    ? `<div class="side-label">SIDE · B</div>${right.map((a, i) => sideCard(a, i * 2 + 2)).join('')}`
    : '');

  // ── Reader modal ──
  const byId = Object.fromEntries(all.map(a => [a.id, a]));
  const reader = $('reader');
  function openReader(id) {
    const a = byId[id];
    if (!a) return;
    $('reader-title').textContent = a.headline;
    $('reader-byline').textContent = `SIGNAL · ${fmtDate(a.placed_at || gen)}`;
    $('reader-body').innerHTML = paragraphs(a.body).map(p => `<p>${esc(p)}</p>`).join('');
    reader.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeReader() {
    reader.classList.remove('open');
    document.body.style.overflow = '';
  }
  $('reader-close').addEventListener('click', closeReader);
  reader.addEventListener('click', (e) => { if (e.target === reader) closeReader(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeReader(); });
  document.querySelectorAll('[data-id]').forEach(el => {
    el.addEventListener('click', () => openReader(el.dataset.id));
  });
})();
</script>
</body>
</html>
